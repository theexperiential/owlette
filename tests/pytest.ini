[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = .
addopts =
    -v
    -l
    -ra
    --strict-markers
    --tb=short
markers =
    integration: Integration tests hitting real endpoints
    api: API endpoint tests
    destructive: Tests that create/modify real data (need cleanup)
    readonly: Tests that only read data (safe to run anytime)
    slow: Slow tests (large downloads, long installs) — skip with -m "not slow"
log_cli = true
log_cli_level = INFO
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
