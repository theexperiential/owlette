  # ──────────────────────────────────────────────────────────────────────
  # api-sprint wave 2 — track 2A (machine-api MVP).
  # appended at end-of-paths to avoid line-conflict with parallel work.
  # ──────────────────────────────────────────────────────────────────────

  /api/sites/{siteId}/machines/{machineId}/commands:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    post:
      operationId: dispatchMachineCommand
      tags: [machines]
      summary: queue a command on a machine
      description: |
        Public counterpart of `/api/admin/commands/send`. Restricted to
        an operator-safe allowlist: `reboot_machine`, `shutdown_machine`,
        `capture_screenshot`. Live-view is intentionally absent (deferred
        to wave 4). Requires `machine=<machineId>:write` for api-key
        callers; session/id-token callers fall through to site
        membership.

        Returns 409 `machine_offline` if `machines/{machineId}.online`
        is `false` — the command is NOT queued.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [reboot_machine, shutdown_machine, capture_screenshot]
                params:
                  type: object
                  description: |
                    Per-type parameters. `reboot_machine` /
                    `shutdown_machine` accept `delay_seconds` (>=0).
                    `capture_screenshot` accepts `monitor` ('all' |
                    'primary' | non-negative integer).
                  properties:
                    delay_seconds: { type: integer, minimum: 0 }
                    monitor:
                      oneOf:
                        - type: string
                          enum: [all, primary]
                        - type: integer
                          minimum: 0
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 600
                  default: 60
      responses:
        '202':
          description: Command queued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status:
                        type: string
                        enum: [pending]
        '400':
          description: |
            Validation failure. Stable code `unsupported_command_type`
            indicates the requested type is outside the public allowlist.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409':
          description: |
            `machine_offline` — machine is not currently connected; queueing is refused.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/commands/{commandId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - name: commandId
        in: path
        required: true
        schema:
          type: string
          pattern: '^cmd_[A-Za-z0-9_-]{1,80}$'
        description: Command id returned by the dispatch endpoint.
    get:
      operationId: getMachineCommandStatus
      tags: [machines]
      summary: poll command status
      description: |
        Returns the current status of a queued command. For completed
        `capture_screenshot` commands, the response includes a freshly-
        minted 1-hour signed read URL under `result.screenshot_url` —
        the URL is per-request and is never persisted.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Command status envelope.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status:
                        type: string
                        enum: [pending, in_progress, completed, failed]
                      result:
                        type: object
                        description: |
                          Present when status=completed. For
                          capture_screenshot commands, includes
                          `screenshot_url` (1-hour signed) +
                          `expires_at`.
                        properties:
                          screenshot_url: { type: string, format: uri }
                          expires_at: { type: string, format: date-time }
                      error:
                        type: string
                        description: Present when status=failed.
                      createdAt: { type: string, format: date-time, nullable: true }
                      updatedAt: { type: string, format: date-time, nullable: true }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/screenshots/upload-url:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    post:
      operationId: issueScreenshotUploadUrl
      tags: [machines]
      summary: mint a 5-minute signed write url for screenshot upload
      description: |
        Agent-internal helper invoked during a `capture_screenshot`
        command. Returns a 5-minute v4-signed PUT URL plus the
        canonical storage path (`screenshots/{siteId}/{machineId}/...png`)
        the agent should write to. Decoupling upload from command
        queueing keeps multi-megabyte image payloads off the web tier.

        30-day retention is enforced via a separate Firebase Storage
        lifecycle rule (out of scope for this endpoint).
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                contentType:
                  type: string
                  enum: [image/png, image/jpeg]
                  default: image/png
      responses:
        '200':
          description: Signed upload url issued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [uploadUrl, storagePath, contentType, expiresAt]
                    properties:
                      uploadUrl: { type: string, format: uri }
                      storagePath: { type: string }
                      contentType: { type: string }
                      expiresAt: { type: string, format: date-time }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

# ════════════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════════════
  /api/sites/{siteId}/machines/{machineId}/processes:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: machineId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Processes]
      summary: list processes on a machine
      description: |
        List all processes configured on a machine, merged with their live
        runtime status (pid, responsiveness, last update). Requires
        `machine=<machineId>:read`.
      responses:
        '200':
          description: List of processes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      processes:
                        type: array
                        items: { type: object }
                      nextPageToken:
                        type: string
                        nullable: true
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
    post:
      tags: [Processes]
      summary: create a process
      description: |
        Create a new process configuration. `processId` is server-generated.
        Duplicate `name` per machine is rejected with 409 `duplicate_process_name`.
        Requires `machine=<machineId>:write` and `Idempotency-Key`.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, exe_path]
              properties:
                name: { type: string }
                exe_path: { type: string }
                file_path: { type: string }
                cwd: { type: string }
                priority: { type: string }
                visibility: { type: string }
                time_delay: { type: string }
                time_to_init: { type: string }
                relaunch_attempts: { type: string }
                launch_mode:
                  type: string
                  enum: [off, always, scheduled]
                schedules: { type: array, items: { type: object } }
      responses:
        '201':
          description: Process created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      processId: { type: string }
        '400': { description: Invalid request }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '409':
          description: Duplicate process name
          content:
            application/problem+json:
              schema:
                type: object
                properties:
                  code: { type: string, example: duplicate_process_name }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: machineId
        in: path
        required: true
        schema: { type: string }
      - name: processId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Processes]
      summary: get a single process detail
      description: Requires `machine=<machineId>:read`.
      responses:
        '200': { description: Process detail }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Process not found }
    patch:
      tags: [Processes]
      summary: partial update a process
      description: |
        Update one or more process fields. `processId` and `id` cannot be
        mutated. Duplicate-name attempts return 409. Requires `machine=<id>:write`.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: Updated }
        '400': { description: Invalid request }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Process not found }
        '409': { description: Duplicate process name }
    delete:
      tags: [Processes]
      summary: delete a process
      description: |
        True-idempotent: returns 200 with `alreadyDeleted: true` when the
        process is already missing. Does NOT kill a running pid — issue
        `/kill` first if needed. Requires `machine=<id>:write`.
      responses:
        '200':
          description: Removed (or already absent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      processId: { type: string }
                      alreadyDeleted: { type: boolean }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/kill:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: machineId
        in: path
        required: true
        schema: { type: string }
      - name: processId
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: true
        schema: { type: string }
    post:
      tags: [Processes]
      summary: kill a running process (queued command)
      description: |
        Queue a `kill_process` command on the machine. Requires `machine=<id>:write`.
        Returns 202 with the queued `commandId`.
      responses:
        '202':
          description: Command queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      commandId: { type: string }
                      status: { type: string, example: pending }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Process not found }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/start:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: machineId
        in: path
        required: true
        schema: { type: string }
      - name: processId
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: true
        schema: { type: string }
    post:
      tags: [Processes]
      summary: start a process (queued command)
      description: Queue a `start_process` command. Requires `machine=<id>:write`.
      responses:
        '202': { description: Command queued }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Process not found }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/stop:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: machineId
        in: path
        required: true
        schema: { type: string }
      - name: processId
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: true
        schema: { type: string }
    post:
      tags: [Processes]
      summary: stop a process gracefully (queued command)
      description: Queue a `stop_process` command. Requires `machine=<id>:write`.
      responses:
        '202': { description: Command queued }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Process not found }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/schedule:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: machineId
        in: path
        required: true
        schema: { type: string }
      - name: processId
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: true
        schema: { type: string }
    post:
      tags: [Processes]
      summary: update a process schedule (no command queue)
      description: |
        Update the schedule on a process. Does NOT queue a command — the
        agent picks up the new schedule on its next monitoring cycle.
        Requires `machine=<id>:write`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [off, always, scheduled]
                blocks:
                  type: array
                  description: required when mode=scheduled
                  items:
                    type: object
                    properties:
                      days: { type: array, items: { type: string } }
                      ranges:
                        type: array
                        items:
                          type: object
                          properties:
                            start: { type: string }
                            stop: { type: string }
      responses:
        '200': { description: Schedule updated }
        '400': { description: Invalid mode or missing blocks }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Process not found }

  # ──────────────────────────────────────────────────────────────────────
  # Chat (cortex-api / api-sprint wave 3 — track 3A)
  # ──────────────────────────────────────────────────────────────────────

  /api/chat:
    get:
      tags: [Chat]
      summary: list conversations the caller can see
      description: |
        List chat conversations the caller has access to. For api-key callers
        the returned set is filtered to sites where the key holds
        `chat=<siteId>:read` (or `chat=*:read`). Session/id-token callers
        see every conversation in their site-membership list. Cursor-paginated.
      parameters:
        - name: page_size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: page_token
          in: query
          required: false
          schema: { type: string }
        - name: includeDeleted
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: owner
          in: query
          required: false
          description: Set to `me` to filter to conversations the caller owns.
          schema: { type: string, enum: [me] }
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversations:
                        type: array
                        items:
                          type: object
                          properties:
                            conversationId: { type: string }
                            title: { type: string }
                            siteId: { type: string }
                            machineId: { type: string }
                            ownerUid: { type: string }
                            createdAt: { type: string, format: date-time }
                            updatedAt: { type: string, format: date-time }
                            deletedAt: { type: string, format: date-time }
                            messageCount: { type: integer }
                      nextPageToken: { type: string }
        '401': { description: Unauthorized }

  /api/chat/new:
    post:
      tags: [Chat]
      summary: create a chat conversation
      description: |
        Create a new conversation. Pin to a single machine via `machineId`,
        or omit it for site-wide mode (server-side LLM fans tools across
        every online machine). Requires `chat=<siteId>:write`. Idempotent.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteId]
              properties:
                siteId: { type: string }
                machineId: { type: string }
                title: { type: string, maxLength: 100 }
                initial_message:
                  type: object
                  required: [role, content]
                  properties:
                    role: { type: string, enum: [user, assistant, system] }
                    content: { type: string }
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversationId: { type: string }
                      title: { type: string }
                      siteId: { type: string }
                      machineId: { type: string }
                      ownerUid: { type: string }
                      createdAt: { type: string, format: date-time }
                      updatedAt: { type: string, format: date-time }
                      messages:
                        type: array
                        items:
                          type: object
                          properties:
                            role: { type: string, enum: [user, assistant, system] }
                            content: { type: string }
                            timestamp: { type: string, format: date-time }
                      messageCount: { type: integer }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }

  /api/chat/{conversationId}:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Chat]
      summary: send a message and stream the response
      description: |
        Append a message to the conversation and stream the assistant's reply.
        The response is `text/plain; charset=utf-8` carrying AI-SDK protocol
        frames (`0:"delta"`, `d:{...}`, `3:"err"`) — same format as the
        legacy `/api/cortex` endpoint. Requires `chat=<siteId>:write`. Idempotent.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role, content]
              properties:
                role: { type: string, enum: [user, assistant, system] }
                content: { type: string }
                machineId:
                  type: string
                  description: Override the conversation's pinned machine for this turn.
                machineName: { type: string }
      responses:
        '200':
          description: Streaming response (text/plain, AI-SDK frames)
          content:
            text/plain:
              schema: { type: string }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Conversation not found }
        '503': { description: Cortex / target machine unavailable }
    patch:
      tags: [Chat]
      summary: rename a conversation
      description: |
        Update the conversation title. Other fields are rejected with
        400 `forbidden_field`. Requires `chat=<siteId>:write`. Idempotent.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, maxLength: 100 }
      responses:
        '200':
          description: Renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversationId: { type: string }
                      title: { type: string }
        '400': { description: Validation failed / forbidden_field }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Conversation not found }
    delete:
      tags: [Chat]
      summary: soft-delete a conversation
      description: |
        True-idempotent: a second DELETE on the same conversationId returns
        200 with `alreadyDeleted: true` and the original deletedAt. Requires
        `chat=<siteId>:write`.
      responses:
        '200':
          description: Soft-deleted (or already absent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversationId: { type: string }
                      alreadyDeleted: { type: boolean }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Conversation never existed }

  # ──────────────────────────────────────────────────────────────────────
  # Users (users-api / api-sprint wave 3 — track 3B)
  # ──────────────────────────────────────────────────────────────────────

  /api/users:
    get:
      tags: [Users]
      summary: list platform users (superadmin only)
      description: |
        Cursor-paginated per AIP-158. Soft-deleted users are excluded by
        default. Requires `user=*:read` scope (superadmin-only at minting)
        or a session/id-token from a superadmin user.
      parameters:
        - name: page_size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: page_token
          in: query
          required: false
          schema: { type: string }
        - name: role
          in: query
          required: false
          schema: { type: string, enum: [member, admin, superadmin] }
        - name: site
          in: query
          required: false
          description: filter to users where this siteId is in their `sites[]`
          schema: { type: string }
        - name: includeDeleted
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Page of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        uid: { type: string }
                        email: { type: string, nullable: true }
                        role: { type: string, enum: [member, admin, superadmin] }
                        sites: { type: array, items: { type: string } }
                        deletedAt: { type: integer, nullable: true }
                  nextPageToken: { type: string }
        '400': { description: Invalid filter }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }

  /api/users/{uid}:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Users]
      summary: get user detail (superadmin only)
      description: |
        Returns the user's role, site assignments, and metadata. Requires
        `user=*:read` scope or session/id-token from a superadmin user.
      responses:
        '200': { description: User detail }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }
    delete:
      tags: [Users]
      summary: soft-delete a user with cascade (superadmin only)
      description: |
        Soft-delete cascade. Sets `deletedAt`, revokes the user's api keys,
        cancels their pending commands (best-effort, async), and transfers
        owned sites to the supplied `successorUid`. Refuses if the user
        owns sites and `successorUid` is not provided (409 `orphan_sites`).

        True-idempotent: re-issuing DELETE on an already-deleted user
        returns 200 with `alreadyDeleted: true`.

        Requires `user=*:admin` scope or session/id-token from a superadmin.
      parameters:
        - name: successorUid
          in: query
          required: false
          description: |
            Required when the user owns one or more sites. The successor
            must exist, not be soft-deleted, and have role `admin` or
            `superadmin`.
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Soft-deleted (or already deleted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid: { type: string }
                  alreadyDeleted: { type: boolean }
                  deletedAt: { type: integer }
                  transferredSites:
                    type: array
                    items: { type: string }
                  revokedKeyIds:
                    type: array
                    items: { type: string }
        '400': { description: Invalid successor }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }
        '409': { description: Orphan sites (provide successorUid) }

  /api/users/{uid}/promote:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: promote a user to admin or superadmin
      description: |
        Atomic role update via Firestore transaction. Requires `user=*:write`
        scope or session/id-token from a superadmin user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, superadmin]
      responses:
        '200': { description: Promoted (or noop if already at requested role) }
        '400': { description: Invalid role / soft-deleted target }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }

  /api/users/{uid}/demote:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: demote a user to member
      description: |
        Atomic role update via Firestore transaction. Refuses to demote the
        last active superadmin (409 `last_superadmin`). Requires
        `user=*:write` scope or session/id-token from a superadmin user.
      responses:
        '200': { description: Demoted (or noop if already member) }
        '400': { description: Soft-deleted target }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }
        '409': { description: Last superadmin (cannot demote) }

  /api/users/{uid}/assign-sites:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: assign sites to a user
      description: |
        Adds siteIds to `users/{uid}.sites[]` via `arrayUnion` (idempotent
        at the field level). Validates each siteId exists; rejects the
        whole batch if any are unknown. Requires `user=*:write` scope or
        session/id-token from a superadmin user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteIds]
              properties:
                siteIds:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 100
      responses:
        '200': { description: Sites assigned }
        '400': { description: Validation failure / unknown_site }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }

  /api/users/{uid}/remove-sites:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: remove sites from a user
      description: |
        Removes siteIds from `users/{uid}.sites[]` via `arrayRemove`. Best-
        effort cancels pending commands the user issued on those sites
        (failure does not block the response). Requires `user=*:write`
        scope or session/id-token from a superadmin user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteIds]
              properties:
                siteIds:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 100
      responses:
        '200': { description: Sites removed }
        '400': { description: Validation failure }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }

  # ──────────────────────────────────────────────────────────────────────
  # Site members (users-api / api-sprint wave 3 — track 3B)
  # ──────────────────────────────────────────────────────────────────────

  /api/sites/{siteId}/members:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [SiteMembers]
      summary: list site members with derived per-site role
      description: |
        Membership lives only on `users/{uid}.sites[]` (per the api-sprint
        wave 0.2 decision). This endpoint resolves it by querying users
        where `sites array-contains <siteId>` and additionally surfaces
        the site `owner` if they aren't already in that set. Per-site
        role is derived: `owner` (always wins), then `superadmin`,
        `admin` (global admin assigned to the site), else `member`.

        Requires `site=<siteId>:admin` scope or session/id-token from an
        admin of this site.
      responses:
        '200':
          description: Members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        uid: { type: string }
                        email: { type: string, nullable: true }
                        role:
                          type: string
                          enum: [owner, superadmin, admin, member]
                        globalRole:
                          type: string
                          enum: [member, admin, superadmin]
                        sites: { type: array, items: { type: string } }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not site admin) }
        '404': { description: Site not found or no access }
    post:
      tags: [SiteMembers]
      summary: add a member to a site
      description: |
        Adds siteId to the target user's `users/{uid}.sites[]` via
        `arrayUnion`. The per-site role is derived from global role at
        read time, so requesting `role: 'admin'` for a member-tier user
        only succeeds in extending membership — the global role is
        unchanged (use `/api/users/{uid}/promote` for that). The
        response includes `roleHonored: false` in that case.

        Requires `site=<siteId>:admin` scope or session/id-token from an
        admin of this site.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid, role]
              properties:
                uid: { type: string }
                role: { type: string, enum: [admin, member] }
      responses:
        '200': { description: Member added }
        '400': { description: Validation failure }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not site admin) }
        '404': { description: User or site not found }

  /api/sites/{siteId}/members/{uid}:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    delete:
      tags: [SiteMembers]
      summary: remove a member from a site
      description: |
        Removes siteId from the target user's `users/{uid}.sites[]` via
        `arrayRemove`. Refuses to remove the site owner (409
        `cannot_remove_owner`) — use `DELETE /api/users/{uid}?successorUid=<uid>`
        to transfer ownership instead.

        True-idempotent: removing a non-member returns 200 with
        `wasMember: false`.

        Requires `site=<siteId>:admin` scope or session/id-token from an
        admin of this site.
      responses:
        '200':
          description: Member removed (or was not a member)
          content:
            application/json:
              schema:
                type: object
                properties:
                  siteId: { type: string }
                  uid: { type: string }
                  wasMember: { type: boolean }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not site admin) }
        '404': { description: User or site not found }
        '409': { description: Cannot remove site owner }

# ════════════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: x-api-key
      in: header
      description: |
        Legacy api key header — supported for backwards compatibility.
        New integrations should use `bearerApiKey` instead
        (`Authorization: Bearer owk_live_...`).
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: owk_live_* / owk_test_*
      description: |
        Preferred auth mechanism for the public roost api. Send the
        scoped api key as `Authorization: Bearer owk_live_<secret>`
        (production) or `Authorization: Bearer owk_test_<secret>`
        (sandbox). See [authentication.md](../docs/api/authentication.md).
    firebaseIdToken:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: |
        Firebase ID token issued to the authenticated user or agent device.
        Used by dashboard + agent requests to roost endpoints. First-party
        clients only — external integrations use `apiKey` /
        `bearerApiKey` instead.

  parameters:
    SiteIdQuery:
      name: siteId
      in: query
      required: true
      schema:
        type: string
      description: The site ID

    MachineIdQuery:
      name: machineId
      in: query
      required: true
      schema:
        type: string
      description: The machine ID

    ProcessIdPath:
      name: processId
      in: path
      required: true
      schema:
        type: string
      description: The process configuration ID

    DeploymentIdPath:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
      description: The deployment ID

    RoostIdPath:
      name: roostId
      in: path
      required: true
      schema:
        type: string
      description: The roost ID (deploy unit).

    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: |
        Client-generated idempotency key. If the server has seen the same
        key on a request with the same body within the replay window, it
        returns the original response instead of re-executing.

    RoostVersionHeader:
      name: Roost-Version
      in: header
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
        example: '2026-04-22'
      description: |
        Selects a dated api version. Optional in wave 1; required once
        a second version ships. See [`GET /api/version`](#tag/utility/operation/getApiVersion).

    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
      description: |
        Optimistic concurrency token. Pass the prior resource version
        (e.g. a `currentVersionId` or opaque etag) to have the server
        reject the mutation with 412 if the resource has changed.

    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum items per page.

    PageTokenQuery:
      name: page_token
      in: query
      required: false
      schema:
        type: string
      description: |
        Opaque cursor from the prior response's `next_page_token`. An
        empty string means no more pages.

    KeyIdPath:
      name: keyId
      in: path
      required: true
      schema:
        type: string
        pattern: '^key_[A-Z0-9]+$'
      description: The api key id (ulid-encoded).

    WebhookIdPath:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
        pattern: '^whk_[A-Z0-9]+$'
      description: Webhook subscription id (ulid-encoded).

    DeliveryIdPath:
      name: deliveryId
      in: path
      required: true
      schema:
        type: string
        pattern: '^whd_[A-Z0-9]+$'
      description: Webhook delivery id (ulid-encoded).

    RolloutIdPath:
      name: rolloutId
      in: path
      required: true
      schema:
        type: string
        pattern: '^rollout_[A-Z0-9]+$'
      description: Rollout (deployment) id (ulid-encoded).

    SiteIdPath:
      name: siteId
      in: path
      required: true
      schema:
        type: string
      description: Site id (path param variant; distinct from the `siteId` query parameter).

    MachineIdSitePath:
      name: machineId
      in: path
      required: true
      schema:
        type: string
      description: Machine id (path param on `/api/sites/{siteId}/machines/{machineId}`).

    VersionRefPath:
      name: versionRef
      in: path
      required: true
      schema:
        type: string
      description: |
        Addresses a version on the roost. Accepts any of:
          - a stable content-addressed id: `vrs_<hex>`
          - a version number: `3`, `#3`, `v3`, or `V3`
          - a roost-relative alias: `current`, `previous`, `first`
        Malformed refs return 400 `version_ref_malformed`;
        unmatched refs return 404 `version_not_found`.

    DigestPath:
      name: digest
      in: path
      required: true
      schema:
        type: string
        pattern: '^sha256:[0-9a-f]{64}$'
      description: Chunk digest (`sha256:` prefixed lowercase hex).

    RecordHashPath:
      name: recordHash
      in: path
      required: true
      schema:
        type: string
        pattern: '^sha256:[0-9a-f]{64}$'
      description: Audit record hash (`sha256:` prefixed lowercase hex).

  headers:
    RateLimitLimit:
      description: Window limit for the rate-limit bucket that fired for this request.
      schema:
        type: integer
    RateLimitRemaining:
      description: Calls remaining in the current window.
      schema:
        type: integer
    RateLimitReset:
      description: Seconds until the current window fully resets.
      schema:
        type: integer
    RetryAfter:
      description: Seconds the client should wait before retrying (429 only).
      schema:
        type: integer
    RoostRateLimitedReason:
      description: |
        Which rate-limit bucket tripped (`global-rate`, `endpoint-rate`,
        `key-rate`, `site-concurrency`). Present only on 429.
      schema:
        type: string
        enum: [global-rate, endpoint-rate, key-rate, site-concurrency]

  responses:
    Problem400:
      description: Validation failed.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem401:
      description: Authentication required.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem402:
      description: Quota exceeded.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem403:
      description: Forbidden (e.g. cross-site access).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem404:
      description: Resource not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem409:
      description: Conflict (e.g. no previous version to roll back to).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem412:
      description: Precondition failed (optimistic concurrency miss on finalize).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem413:
      description: |
        Payload too large or quota-bound size limit exceeded — e.g. a
        deployment with more target machines than the per-site quota
        allows. The body carries `code: over_quota` and a `quota` block
        describing the active limit.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem422:
      description: |
        Request semantics violated a constraint — e.g. an `Idempotency-Key`
        was reused with a different request body (`code: idempotency_key_mismatch`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem429:
      description: Rate limited.
      headers:
        RateLimit-Limit:           { $ref: '#/components/headers/RateLimitLimit' }
        RateLimit-Remaining:       { $ref: '#/components/headers/RateLimitRemaining' }
        RateLimit-Reset:           { $ref: '#/components/headers/RateLimitReset' }
        Retry-After:               { $ref: '#/components/headers/RetryAfter' }
        Roost-Rate-Limited-Reason: { $ref: '#/components/headers/RoostRateLimitedReason' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem500:
      description: Internal server error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem501:
      description: |
        Endpoint is scaffolded but the backing infrastructure is not yet
        provisioned (current state for roost stubs pending wave 0.5/0.6).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      example:
        error: Description of what went wrong

    Site:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        machineCount:
          type: integer

    Machine:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        online:
          type: boolean
        lastHeartbeat:
          type: string
          format: date-time
        agentVersion:
          type: string
        os:
          type: string

    Process:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        exe_path:
          type: string
        launch_mode:
          type: string
          enum: [off, always, scheduled]
        status:
          type: string

    Schedule:
      type: object
      properties:
        days:
          type: array
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        startTime:
          type: string
          description: 24-hour time (HH:MM)
          example: "08:00"
        endTime:
          type: string
          description: 24-hour time (HH:MM)
          example: "18:00"

    DeploymentSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        installer_name:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, partial, cancelled, uninstalled]
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds

    Deployment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        installer_name:
          type: string
        installer_url:
          type: string
          format: uri
        silent_flags:
          type: string
        verify_path:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, partial, cancelled, uninstalled]
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds
        targets:
          type: array
          items:
            type: object
            properties:
              machineId:
                type: string
              status:
                type: string
              progress:
                type: integer
                description: Download progress percentage (0-100)
              completedAt:
                type: integer
                description: Unix timestamp in milliseconds

    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [process_crash, machine_offline, connection_failure]
        createdAt:
          type: string
          format: date-time

    ApiKeyMetadata:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
          description: First few characters of the key for identification
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    InstallerVersion:
      type: object
      properties:
        version:
          type: string
        fileName:
          type: string
        downloadUrl:
          type: string
          format: uri
        releaseNotes:
          type: string
        isLatest:
          type: boolean
        uploadedAt:
          type: string
          format: date-time

    McpTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        tier:
          type: integer
          enum: [1, 2, 3]
          description: "1 = read-only, 2 = actions, 3 = advanced"
        parameters:
          type: object
          description: JSON Schema for tool parameters

    # ── roost (project distribution v2) ─────────────────────────────
    ProblemDetails:
      type: object
      description: |
        RFC 7807 problem+json envelope returned by all roost endpoints on
        error. Unlike the legacy `ErrorResponse`, this carries a stable
        machine-readable `type` URI, a correlation `requestId`, and
        optional field-level `errors`.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: Stable URI identifying the problem category.
          example: https://owlette.app/problems/validation-failed
        title:
          type: string
          description: Short, stable human-readable summary.
          example: validation failed
        status:
          type: integer
          description: HTTP status code, mirrors the response status.
          example: 400
        detail:
          type: string
          description: Occurrence-specific explanation; safe to show to users.
        instance:
          type: string
          description: URI reference for this occurrence (often the route path).
        requestId:
          type: string
          description: Correlation ID for trace lookup; quote in support tickets.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: |
            Field-level errors keyed by dotted JSON path (400/422 responses).
            Example: `{ "body.hashes": ["must be a non-empty array"] }`

    VersionSummary:
      type: object
      description: Entry in a roost's immutable version history.
      required: [versionId, versionNumber, createdAt, totalSize, totalFiles]
      properties:
        versionId:
          type: string
          description: Stable content-addressed id (`vrs_*`).
        versionNumber:
          type: integer
          description: Monotonic 1-indexed version number, per-roost.
        description:
          type: string
          nullable: true
          maxLength: 500
          description: |
            Optional plaintext "what changed?" note supplied at publish
            time or edited later via PATCH. Null when missing.
        versionUrl:
          type: string
          format: uri
          description: R2 URL of the version body (short-TTL signed).
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: UID of the user or agent that published this version.
        totalSize:
          type: integer
          format: int64
          description: Sum of all file sizes in bytes.
        totalFiles:
          type: integer
        parentVersionId:
          type: string
          nullable: true

    OciVersion:
      type: object
      description: |
        OCI Image v1.1 derivation — owlette surfaces this as "version". See
        [version-format.md](../docs/internal/version-format.md) for the
        full schema. This OpenAPI description captures the shape required
        by the finalize endpoint; the authoritative JSON schema lives in
        the internal docs.
      required: [schemaVersion, mediaType, config, files]
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        mediaType:
          type: string
          enum: [application/vnd.owlette.version.v1+json]
        config:
          type: object
          required: [name, createdAt, createdBy, siteId]
          properties:
            name:
              type: string
            createdAt:
              type: string
              format: date-time
            createdBy:
              type: string
            siteId:
              type: string
        files:
          type: array
          items:
            type: object
            required: [path, size, chunks]
            properties:
              path:
                type: string
                description: |
                  POSIX-style relative path. Agents reject absolute paths,
                  `..`, `.`, empty segments, NUL bytes, drive letters, and
                  ADS colons.
              size:
                type: integer
                format: int64
                minimum: 0
              chunks:
                type: array
                items:
                  type: object
                  required: [hash, size]
                  properties:
                    hash:
                      type: string
                      pattern: '^[0-9a-f]{64}$'
                    size:
                      type: integer
                      minimum: 1

    # ── public roost api schemas (wave 1) ───────────────────────────

    # Common primitives.
    Permission:
      type: string
      enum: [read, write, deploy, rollback, admin]
      description: |
        Atomic permission within a scope entry. `admin` is the
        superset; `deploy` implies `read`; `write` implies `read`.
    Scope:
      type: object
      description: |
        One entry on an api key's `scopes[]`. The set of scopes on a
        key is the union of access granted.
      required: [resource, id, permissions]
      properties:
        resource:
          type: string
          enum: [site, roost, machine]
          description: Resource type this entry grants against.
        id:
          type: string
          description: |
            Specific resource id or `*` to match any resource of the
            given type within the caller's own access.
        permissions:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Permission' }

    Cursor:
      type: string
      description: |
        Opaque pagination cursor. Not a stable format — clients must
        round-trip the exact bytes without parsing.

    # api keys
    ApiKey:
      type: object
      required: [id, name, environment, keyPrefix, scopes, createdAt]
      properties:
        id:            { type: string }
        name:          { type: string, maxLength: 128 }
        environment:
          type: string
          enum: [live, test]
        keyPrefix:
          type: string
          description: First ~14 chars of the raw key; safe to display.
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        lastUsedIp:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
    ApiKeyWithSecret:
      description: |
        Returned **only** on create or rotate — the one and only time
        the raw `key` value is exposed. Subsequent reads return
        `keyPrefix` only.
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: Raw api key (`owk_live_*` or `owk_test_*`). Store immediately.
            previousKeyExpiresAt:
              type: string
              format: date-time
              nullable: true
              description: Rotation grace window end (rotate only; null on create).
            rotatedAt:
              type: string
              format: date-time
              nullable: true
              description: Timestamp of the rotation (rotate only; null on create).
    CreateApiKeyRequest:
      type: object
      required: [name, environment, scopes]
      properties:
        name:          { type: string, maxLength: 128 }
        environment:
          type: string
          enum: [live, test]
        scopes:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Scope' }
        ttlDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 90
    PatchApiKeyRequest:
      type: object
      description: |
        Any combination of `name` and `scopes` may be provided. Scopes
        may only be narrowed; broadening returns 400.
      properties:
        name:   { type: string, maxLength: 128 }
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
    RotateApiKeyRequest:
      type: object
      properties:
        graceHours:
          type: integer
          minimum: 0
          maximum: 72
          default: 24

    # roosts
    RoostSummary:
      type: object
      required: [id, siteId, name, targets, totalSize, totalFiles, updatedAt]
      properties:
        id:       { type: string }
        siteId:   { type: string }
        name:     { type: string }
        targets:
          type: array
          items: { type: string }
        currentVersionId:
          type: string
          nullable: true
          pattern: '^sha256:[0-9a-f]{64}$'
        previousVersionId:
          type: string
          nullable: true
          pattern: '^sha256:[0-9a-f]{64}$'
        totalSize:
          type: integer
          format: int64
          minimum: 0
        totalFiles:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time
    Roost:
      description: Full roost detail. Extends `RoostSummary` with `createdAt`.
      allOf:
        - $ref: '#/components/schemas/RoostSummary'
        - type: object
          required: [createdAt]
          properties:
            createdAt:
              type: string
              format: date-time
    CreateRoostRequest:
      type: object
      required: [siteId, name]
      properties:
        siteId:  { type: string }
        name:
          type: string
          maxLength: 128
          description: Display name. Must be unique within the site.
        targets:
          type: array
          items: { type: string }
          description: Machine ids to target; may be empty at create time.
    PatchRoostRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        targets:
          type: array
          items: { type: string }

    # versions
    VersionFile:
      type: object
      required: [path, digest, size]
      properties:
        path:   { type: string }
        digest:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        size:
          type: integer
          format: int64
          minimum: 0
    Version:
      description: |
        Full oci-style version body. Roost emits schemaVersion 2,
        mediaType `application/vnd.owlette.version.v1+json`. See
        [versions.md](../docs/api/versions.md).
      type: object
      required: [schemaVersion, mediaType, config, layers]
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        mediaType:
          type: string
          enum: [application/vnd.owlette.version.v1+json]
        config:
          type: object
          required: [mediaType, digest, size]
          properties:
            mediaType: { type: string }
            digest:
              type: string
              pattern: '^sha256:[0-9a-f]{64}$'
            size:
              type: integer
              format: int64
              minimum: 0
        layers:
          type: array
          items:
            type: object
            required: [mediaType, path, digest, size]
            properties:
              mediaType: { type: string }
              path:      { type: string }
              digest:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
              size:
                type: integer
                format: int64
                minimum: 0
    VersionDetail:
      description: Version metadata wrapper returned on GET.
      type: object
      required: [id, versionNumber, publishedAt, totalSize, totalFiles, isCurrent, version]
      properties:
        id:
          type: string
          description: Stable content-addressed id (`vrs_*`).
        versionNumber:
          type: integer
          description: Monotonic 1-indexed version number, per-roost.
        description:
          type: string
          nullable: true
          maxLength: 500
          description: |
            Optional plaintext "what changed?" note. Editable via PATCH.
        publishedAt:
          type: string
          format: date-time
        publishedBy:
          type: string
          description: User or api key id that published this version.
        totalSize:
          type: integer
          format: int64
        totalFiles:
          type: integer
        isCurrent:
          type: boolean
        version: { $ref: '#/components/schemas/Version' }
    DiffResult:
      type: object
      required: [from, to, added, removed, modified]
      properties:
        from:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        to:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        added:
          type: array
          items: { $ref: '#/components/schemas/VersionFile' }
        removed:
          type: array
          items: { $ref: '#/components/schemas/VersionFile' }
        modified:
          type: array
          items:
            type: object
            required: [path, digestBefore, digestAfter, sizeBefore, sizeAfter]
            properties:
              path: { type: string }
              digestBefore:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
              digestAfter:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
              sizeBefore:
                type: integer
                format: int64
              sizeAfter:
                type: integer
                format: int64

    # chunks
    ChunkReferrer:
      type: object
      required: [roostId, versionId, fileCount]
      properties:
        roostId: { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        fileCount:
          type: integer
          minimum: 1
          description: How many files in that version reference this chunk.
    MountChunkRequest:
      type: object
      required: [siteId, toRoostId]
      properties:
        siteId:    { type: string }
        toRoostId: { type: string }

    # deployments
    MachineDeploymentState:
      type: object
      required: [machineId, state]
      properties:
        machineId: { type: string }
        role:
          type: string
          enum: [canary, fleet]
        state:
          type: string
          enum: [queued, in_progress, succeeded, failed, cancelled, simulated]
        syncStartedAt:
          type: string
          format: date-time
          nullable: true
        syncCompletedAt:
          type: string
          format: date-time
          nullable: true
        bytesTransferred:
          type: integer
          format: int64
          minimum: 0
        error:
          type: string
          nullable: true
    DeployRequest:
      type: object
      required: [siteId, versionId]
      properties:
        siteId: { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        machines:
          type: array
          items: { type: string }
          description: Subset of the roost's targets. Omit to target all.
        scheduleAt:
          type: string
          format: date-time
          nullable: true
          description: Future timestamp to queue the rollout for.
        dryRun:
          type: boolean
          default: false
        strategy:
          type: string
          enum: [all-at-once, canary-then-fleet, canary-only]
          default: all-at-once
    DeploymentPlan:
      description: |
        Initial rollout response (202 Accepted). For ongoing status
        polling, call `GET /api/roosts/{roostId}/deployments/{rolloutId}`.
      type: object
      required: [rolloutId, roostId, versionId, strategy, dryRun, createdAt, machines]
      properties:
        rolloutId: { type: string }
        roostId:   { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        strategy:
          type: string
          enum: [all-at-once, canary-then-fleet, canary-only]
        dryRun:    { type: boolean }
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        machines:
          type: array
          items: { $ref: '#/components/schemas/MachineDeploymentState' }
    DeploymentStatus:
      description: |
        Current state snapshot for a rollout — used by both the list
        endpoint and the detail endpoint (detail populates
        `machines[]`; list omits them to keep payloads small).
      type: object
      required: [rolloutId, roostId, versionId, strategy, state, startedAt]
      properties:
        rolloutId: { type: string }
        roostId:   { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        strategy:
          type: string
          enum: [all-at-once, canary-then-fleet, canary-only]
        state:
          type: string
          enum: [queued, in_progress, succeeded, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        machineCount:
          type: integer
          minimum: 0
        successCount:
          type: integer
          minimum: 0
        failureCount:
          type: integer
          minimum: 0
        machines:
          type: array
          items: { $ref: '#/components/schemas/MachineDeploymentState' }
          description: Populated on detail responses only.
    DryRunResult:
      description: |
        Returned when `DeployRequest.dryRun: true`. Same shape as
        `DeploymentPlan` but every machine is in `state: simulated`
        and no agent is contacted. Included as a distinct schema for
        sdk code-gen clarity.
      allOf:
        - $ref: '#/components/schemas/DeploymentPlan'

    # sites
    SiteSummary:
      type: object
      required: [id, name]
      properties:
        id:       { type: string }
        name:     { type: string }
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
        timezone: { type: string, description: IANA tz name. }
    SiteDetail:
      description: Full site detail; extends `SiteSummary`.
      allOf:
        - $ref: '#/components/schemas/SiteSummary'
        - type: object
          required: [owner, createdAt, machineCount, roostCount]
          properties:
            owner:
              type: string
              description: User id that owns the site.
            createdAt:
              type: string
              format: date-time
            machineCount:
              type: integer
              minimum: 0
            roostCount:
              type: integer
              minimum: 0

    # machines
    MachineSummary:
      type: object
      required: [id, name, online]
      properties:
        id:     { type: string }
        name:   { type: string }
        online: { type: boolean }
        lastHeartbeat:
          type: string
          format: date-time
          nullable: true
        agentVersion:
          type: string
          nullable: true
        currentRoosts:
          type: array
          items:
            type: object
            required: [roostId, versionId]
            properties:
              roostId: { type: string }
              versionId:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
    MachineDetail:
      description: Full machine detail; extends `MachineSummary` with telemetry.
      allOf:
        - $ref: '#/components/schemas/MachineSummary'
        - type: object
          properties:
            siteId: { type: string }
            os:
              type: string
              nullable: true
            cpuUsage:
              type: number
              format: float
              minimum: 0
              maximum: 1
              nullable: true
            memoryUsage:
              type: number
              format: float
              minimum: 0
              maximum: 1
              nullable: true
            diskFreeBytes:
              type: integer
              format: int64
              minimum: 0
              nullable: true
            pendingRollouts:
              type: array
              items: { $ref: '#/components/schemas/DeploymentStatus' }
    MachineDeployment:
      description: One entry in a machine's deployment history.
      type: object
      required: [rolloutId, roostId, versionId, state]
      properties:
        rolloutId: { type: string }
        roostId:   { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        state:
          type: string
          enum: [queued, in_progress, succeeded, failed, cancelled]
        syncStartedAt:
          type: string
          format: date-time
          nullable: true
        syncCompletedAt:
          type: string
          format: date-time
          nullable: true
        bytesTransferred:
          type: integer
          format: int64
          minimum: 0

    # quotas
    Quota:
      type: object
      required: [siteId, tier, limitBytes, usedBytes]
      properties:
        siteId: { type: string }
        tier:
          type: string
          enum: [free, starter, pro, enterprise]
        limitBytes:
          type: integer
          format: int64
          minimum: 0
        usedBytes:
          type: integer
          format: int64
          minimum: 0
        pendingBytes:
          type: integer
          format: int64
          minimum: 0
          description: Bytes reserved by in-flight uploads but not yet persisted.
        bandwidthLimitBytesPerMonth:
          type: integer
          format: int64
          minimum: 0
        bandwidthUsedBytesThisMonth:
          type: integer
          format: int64
          minimum: 0
        alarms:
          type: array
          items:
            type: object
            required: [threshold, firedAt]
            properties:
              threshold:
                type: number
                minimum: 0
                maximum: 1
                description: Fraction of `limitBytes` at which this alarm fired.
              firedAt:
                type: string
                format: date-time
        periodResetsAt:
          type: string
          format: date-time
    QuotaHistoryEntry:
      type: object
      required: [date, usedBytes, bandwidthBytes]
      properties:
        date:
          type: string
          format: date
          description: UTC calendar date (YYYY-MM-DD).
        usedBytes:
          type: integer
          format: int64
          minimum: 0
        bandwidthBytes:
          type: integer
          format: int64
          minimum: 0

    # audit log
    AuditRecord:
      type: object
      required: [recordHash, kind, actor, resource, createdAt]
      properties:
        recordHash:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        previousRecordHash:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
          nullable: true
          description: Null only for the site's genesis record.
        kind:
          type: string
          enum:
            - signed_url_issued
            - distribution_started
            - version_pointer_changed
            - api_key_used
            - gc_run
            - chunk_verify_failed
            - webhook_delivered
        actor:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
              enum: [user, api_key, system]
            id: { type: string }
            scopeFingerprint:
              type: string
              description: Compact summary of the actor's effective scope at the time of the action.
        resource:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
              enum: [site, roost, version, chunk, machine, rollout, webhook, api_key]
            id: { type: string }
        payload:
          type: object
          description: |
            Kind-specific structured detail. Additional properties
            depend on `kind`; treat unknown keys as forward-compatible.
          additionalProperties: true
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    AuditRecordDetail:
      type: object
      required: [record, chain]
      properties:
        record: { $ref: '#/components/schemas/AuditRecord' }
        chain:
          type: object
          required: [verified, genesisHash, chainLength]
          properties:
            verified: { type: boolean }
            genesisHash:
              type: string
              pattern: '^sha256:[0-9a-f]{64}$'
            chainLength:
              type: integer
              minimum: 1

    # webhooks
    WebhookDeliveryStatus:
      type: string
      enum: [pending, success, failed]
    WebhookSubscription:
      description: |
        Base webhook subscription fields. Most reads return the
        `Webhook` wrapper which extends this with activity pointers;
        `WebhookWithSecret` extends with the one-time raw secret.
      type: object
      required: [id, siteId, url, events, paused, createdAt]
      properties:
        id:          { type: string }
        siteId:      { type: string }
        url:
          type: string
          format: uri
          description: Must be https — no private / loopback ips.
        events:
          type: array
          minItems: 1
          items: { type: string }
        description:
          type: string
          nullable: true
        paused:
          type: boolean
          default: false
        secretPrefix:
          type: string
          description: First few chars of the signing secret for identification.
        createdAt:
          type: string
          format: date-time
    WebhookDetail:
      description: |
        Webhook subscription wrapper with activity pointers. Returned
        on `GET /api/webhooks` and `GET /api/webhooks/{webhookId}`.
      allOf:
        - $ref: '#/components/schemas/WebhookSubscription'
        - type: object
          properties:
            lastDeliveryAt:
              type: string
              format: date-time
              nullable: true
            lastDeliveryOk:
              type: boolean
              nullable: true
            consecutiveFailures:
              type: integer
              minimum: 0
    WebhookWithSecret:
      description: |
        Returned **only** on webhook create and `rotate-secret`. The
        `signingSecret` is the full hmac secret — store it immediately.
      allOf:
        - $ref: '#/components/schemas/WebhookSubscription'
        - type: object
          required: [signingSecret]
          properties:
            signingSecret:
              type: string
              description: HMAC signing secret (`whsec_*`). Shown once.
            previousSecretExpiresAt:
              type: string
              format: date-time
              nullable: true
            rotatedAt:
              type: string
              format: date-time
              nullable: true
    CreateWebhookRequest:
      type: object
      required: [siteId, url, events]
      properties:
        siteId: { type: string }
        url:
          type: string
          format: uri
          description: Must be https — no private ips; reachable during create-time smoke test.
        events:
          type: array
          minItems: 1
          items: { type: string }
        description:
          type: string
          maxLength: 256
    PatchWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items: { type: string }
        description:
          type: string
          maxLength: 256
          nullable: true
        paused:
          type: boolean
    WebhookDelivery:
      type: object
      required: [deliveryId, event, status, attemptCount, deliveredAt]
      properties:
        deliveryId: { type: string }
        webhookId:  { type: string }
        event:      { type: string }
        status:     { $ref: '#/components/schemas/WebhookDeliveryStatus' }
        responseStatus:
          type: integer
          nullable: true
          description: HTTP status the target returned. Null if the attempt never connected.
        attemptCount:
          type: integer
          minimum: 1
        deliveredAt:
          type: string
          format: date-time
        nextRetryAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          minimum: 0
        error:
          type: string
          nullable: true
        request:
          type: object
          description: Populated on detail responses only.
          properties:
            url:     { type: string, format: uri }
            headers:
              type: object
              additionalProperties: { type: string }
            body:
              description: Raw event payload; json object.
              additionalProperties: true
        response:
          type: object
          description: Populated on detail responses only; body truncated to 4 KiB.
          properties:
            status:  { type: integer }
            headers:
              type: object
              additionalProperties: { type: string }
            body:      { type: string }
            durationMs: { type: integer, minimum: 0 }
    WebhookProbeRequest:
      type: object
      required: [siteId, url, signingSecret]
      properties:
        siteId: { type: string }
        url:
          type: string
          format: uri
        signingSecret:
          type: string
          description: Secret to hmac-sign the synthetic probe payload with.

    # utility
    WhoAmIResponse:
      type: object
      required: [scopes]
      properties:
        userId:
          type: string
          nullable: true
          description: Present when authenticated with a user session.
        keyId:
          type: string
          nullable: true
          description: Present when authenticated with an api key.
        keyPrefix:
          type: string
          nullable: true
        environment:
          type: string
          enum: [live, test]
          nullable: true
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
        rateLimit:
          type: object
          required: [limit, remaining, resetAt]
          properties:
            limit:     { type: integer }
            remaining: { type: integer }
            resetAt:
              type: string
              format: date-time
        quota:
          type: object
          properties:
            tier:
              type: string
              enum: [free, starter, pro, enterprise]
            usedBytes:
              type: integer
              format: int64
            limitBytes:
              type: integer
              format: int64
    VersionResponse:
      type: object
      required: [current, supported, deprecated, retired]
      properties:
        current:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        supported:
          type: array
          items:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        deprecated:
          type: array
          items:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        retired:
          type: array
          items:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
