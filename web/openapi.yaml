        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
  /api/sites/{siteId}/machines/{machineId}/display-layout:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    put:
      operationId: setMachineDisplayLayout
      tags: [machines]
      summary: capture or configure a machine display layout
      description: |
        Machine-level display configuration surface. This stores the
        assigned layout, toggles auto-restore, resets its circuit breaker,
        or toggles the remote-apply kill switch. Requires
        `machine=<machineId>:write` and an idempotency key.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [op, monitors, capturedBy]
                  properties:
                    op: { type: string, const: capture }
                    monitors:
                      type: array
                      minItems: 1
                      items: { $ref: '#/components/schemas/DisplayMonitor' }
                    capturedBy: { type: string, minLength: 1 }
                - type: object
                  required: [op, enabled]
                  properties:
                    op: { type: string, const: set_auto_restore }
                    enabled: { type: boolean }
                    enabledBy:
                      type: string
                      description: Required when `enabled` is true.
                - type: object
