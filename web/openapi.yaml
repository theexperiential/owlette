      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Unpaginated machine list.
          content:
            application/json:
              schema:
                type: object
                required: [machines]
                properties:
                  machines:
                    type: array
                    items: { $ref: '#/components/schemas/MachineSummary' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    get:
      operationId: getSiteMachine
      tags: [machines]
      summary: fetch machine detail
      description: |
        Full detail for a single machine: inventory fields, heartbeat,
        telemetry metrics, and reported process snapshots.
      security:
