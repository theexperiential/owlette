        See [authentication.md](../docs/api/authentication.md#listing-keys).
      security:
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RoostVersionHeader'
        - name: environment
          in: query
          required: false
          schema:
            type: string
            enum: [live, test]
          description: Filter by environment.
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Paginated list of api key summaries.
