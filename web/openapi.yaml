# ════════════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════════════
  /api/sites/{siteId}/machines/{machineId}/processes:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    get:
      operationId: listMachineProcesses
      tags: [Processes]
      summary: list processes on a machine
      description: |
        List all processes configured on a machine, merged with their live
        runtime status (pid, responsiveness, last update). Requires
        `machine=<machineId>:read`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: List of processes
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [processes, nextPageToken]
                    properties:
                      processes:
                        type: array
                        items: { $ref: '#/components/schemas/Process' }
                      nextPageToken:
                        type: string
                        nullable: true
                        description: Always null in the current process-list contract.
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    post:
      operationId: createMachineProcess
      tags: [Processes]
      summary: create a process
      description: |
        Create a new process configuration. `processId` is server-generated.
        Duplicate `name` per machine is rejected with 409 `duplicate_process_name`.
        Requires `machine=<machineId>:write` and `Idempotency-Key`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, exe_path]
              properties:
                name: { type: string }
                exe_path: { type: string }
                file_path: { type: string }
                cwd: { type: string }
                priority: { type: string }
                visibility: { type: string }
                time_delay: { type: string }
                time_to_init: { type: string }
                relaunch_attempts: { type: string }
                launch_mode:
                  type: string
                  enum: [off, always, scheduled]
                schedulePresetId: { type: string, nullable: true }
                schedules:
                  type: array
                  items: { $ref: '#/components/schemas/ProcessScheduleBlock' }
      responses:
        '201':
          description: Process created
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [processId]
                    properties:
                      processId: { type: string }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - $ref: '#/components/parameters/ProcessIdPath'
    get:
      operationId: getMachineProcess
      tags: [Processes]
      summary: get a single process detail
      description: Requires `machine=<machineId>:read`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Process detail
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data: { $ref: '#/components/schemas/Process' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    patch:
      operationId: updateMachineProcess
      tags: [Processes]
      summary: partial update a process
      description: |
        Update one or more process fields. `processId` and `id` cannot be
        mutated. Duplicate-name attempts return 409. Requires `machine=<machineId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name: { type: string }
                exe_path: { type: string }
                file_path: { type: string }
                cwd: { type: string }
                priority: { type: string }
                visibility: { type: string }
                time_delay: { type: string }
                time_to_init: { type: string }
                relaunch_attempts: { type: string }
                autolaunch: { type: boolean }
                launch_mode:
                  type: string
                  enum: [off, always, scheduled]
                schedulePresetId: { type: string, nullable: true }
                schedules:
                  type: array
                  nullable: true
                  items: { $ref: '#/components/schemas/ProcessScheduleBlock' }
                schedule:
                  type: object
                  nullable: true
                  additionalProperties: true
      responses:
        '200':
          description: Process updated.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [processId]
                    properties:
                      processId: { type: string }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    delete:
      operationId: deleteMachineProcess
      tags: [Processes]
      summary: delete a process
      description: |
        True-idempotent: returns 200 with `alreadyDeleted: true` when the
        process is already missing. Does NOT kill a running pid — issue
        `/kill` first if needed. Requires `machine=<machineId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Removed (or already absent)
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [processId, alreadyDeleted]
                    properties:
                      processId: { type: string }
                      alreadyDeleted: { type: boolean }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/kill:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - $ref: '#/components/parameters/ProcessIdPath'
    post:
      operationId: killMachineProcess
      tags: [Processes]
      summary: kill a running process (queued command)
      description: |
        Queue a `kill_process` command on the machine. Requires `machine=<machineId>:write`.
        Returns 202 with the queued `commandId`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      responses:
        '202':
          description: Command queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status: { type: string, example: pending }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/start:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - $ref: '#/components/parameters/ProcessIdPath'
    post:
      operationId: startMachineProcess
      tags: [Processes]
      summary: start a process (queued command)
      description: Queue a `start_process` command. Requires `machine=<machineId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      responses:
        '202':
          description: Command queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status: { type: string, example: pending }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/stop:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - $ref: '#/components/parameters/ProcessIdPath'
    post:
      operationId: stopMachineProcess
      tags: [Processes]
      summary: stop a process gracefully (queued command)
      description: Queue a `stop_process` command. Requires `machine=<machineId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      responses:
        '202':
          description: Command queued
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status: { type: string, example: pending }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/processes/{processId}/schedule:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - $ref: '#/components/parameters/ProcessIdPath'
    post:
      operationId: scheduleMachineProcess
      tags: [Processes]
      summary: update a process schedule (no command queue)
      description: |
        Update the schedule on a process. Does NOT queue a command — the
        agent picks up the new schedule on its next monitoring cycle.
        Requires `machine=<machineId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mode]
              properties:
                mode:
                  type: string
                  enum: [off, always, scheduled]
                blocks:
                  type: array
                  description: required when mode=scheduled
                  items: { $ref: '#/components/schemas/ProcessScheduleBlock' }
      responses:
        '200':
          description: Schedule updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [processId, mode]
                    properties:
                      processId: { type: string }
                      mode:
                        type: string
                        enum: [off, always, scheduled]
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  # ──────────────────────────────────────────────────────────────────────
  # Chat (cortex-api / api-sprint wave 3 — track 3A)
  # ──────────────────────────────────────────────────────────────────────

  /api/chat:
    get:
      tags: [Chat]
      summary: list conversations the caller can see
      description: |
        List chat conversations the caller has access to. For api-key callers
        the returned set is filtered to sites where the key holds
        `chat=<siteId>:read` (or `chat=*:read`). Session/id-token callers
        see every conversation in their site-membership list. Cursor-paginated.
      parameters:
        - name: page_size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: page_token
          in: query
          required: false
          schema: { type: string }
        - name: includeDeleted
          in: query
          required: false
          schema: { type: boolean, default: false }
        - name: owner
          in: query
          required: false
          description: Set to `me` to filter to conversations the caller owns.
          schema: { type: string, enum: [me] }
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversations:
                        type: array
                        items:
                          type: object
                          properties:
                            conversationId: { type: string }
                            title: { type: string }
                            siteId: { type: string }
                            machineId: { type: string }
                            ownerUid: { type: string }
                            createdAt: { type: string, format: date-time }
                            updatedAt: { type: string, format: date-time }
                            deletedAt: { type: string, format: date-time }
                            messageCount: { type: integer }
                      nextPageToken: { type: string }
        '401': { description: Unauthorized }

  /api/chat/new:
    post:
      tags: [Chat]
      summary: create a chat conversation
      description: |
        Create a new conversation. Pin to a single machine via `machineId`,
        or omit it for site-wide mode (server-side LLM fans tools across
        every online machine). Requires `chat=<siteId>:write`. Idempotent.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteId]
              properties:
                siteId: { type: string }
                machineId: { type: string }
                title: { type: string, maxLength: 100 }
                initial_message:
                  type: object
                  required: [role, content]
                  properties:
                    role: { type: string, enum: [user, assistant, system] }
                    content: { type: string }
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversationId: { type: string }
                      title: { type: string }
                      siteId: { type: string }
                      machineId: { type: string }
                      ownerUid: { type: string }
                      createdAt: { type: string, format: date-time }
                      updatedAt: { type: string, format: date-time }
                      messages:
                        type: array
                        items:
                          type: object
                          properties:
                            role: { type: string, enum: [user, assistant, system] }
                            content: { type: string }
                            timestamp: { type: string, format: date-time }
                      messageCount: { type: integer }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }

  /api/chat/{conversationId}:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Chat]
      summary: send a message and stream the response
      description: |
        Append a message to the conversation and stream the assistant's reply.
        The response is `text/plain; charset=utf-8` carrying AI-SDK protocol
        frames (`0:"delta"`, `d:{...}`, `3:"err"`) — same format as the
        legacy `/api/cortex` endpoint. Requires `chat=<siteId>:write`. Idempotent.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role, content]
              properties:
                role: { type: string, enum: [user, assistant, system] }
                content: { type: string }
                machineId:
                  type: string
                  description: Override the conversation's pinned machine for this turn.
                machineName: { type: string }
      responses:
        '200':
          description: Streaming response (text/plain, AI-SDK frames)
          content:
            text/plain:
              schema: { type: string }
        '400': { description: Validation failed }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Conversation not found }
        '503': { description: Cortex / target machine unavailable }
    patch:
      tags: [Chat]
      summary: rename a conversation
      description: |
        Update the conversation title. Other fields are rejected with
        400 `forbidden_field`. Requires `chat=<siteId>:write`. Idempotent.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, maxLength: 100 }
      responses:
        '200':
          description: Renamed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversationId: { type: string }
                      title: { type: string }
        '400': { description: Validation failed / forbidden_field }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Conversation not found }
    delete:
      tags: [Chat]
      summary: soft-delete a conversation
      description: |
        True-idempotent: a second DELETE on the same conversationId returns
        200 with `alreadyDeleted: true` and the original deletedAt. Requires
        `chat=<siteId>:write`.
      responses:
        '200':
          description: Soft-deleted (or already absent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    properties:
                      conversationId: { type: string }
                      alreadyDeleted: { type: boolean }
        '401': { description: Unauthorized }
        '403': { description: Scope insufficient }
        '404': { description: Conversation never existed }

  # ──────────────────────────────────────────────────────────────────────
  # Users (users-api / api-sprint wave 3 — track 3B)
  # ──────────────────────────────────────────────────────────────────────

  /api/users:
    get:
      tags: [Users]
      summary: list platform users (superadmin only)
      description: |
        Cursor-paginated per AIP-158. Soft-deleted users are excluded by
        default. Requires `user=*:read` scope (superadmin-only at minting)
        or a session/id-token from a superadmin user. Use `page_size`
        and `page_token`; legacy `limit` and `cursor` are accepted for
        existing clients. Responses include
        canonical `next_page_token`; `nextPageToken` is retained as a
        deprecated compatibility alias.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - name: page_size
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: page_token
          in: query
          required: false
          schema: { type: string }
        - name: role
          in: query
          required: false
          schema: { type: string, enum: [member, admin, superadmin] }
        - name: site
          in: query
          required: false
          description: filter to users where this siteId is in their `sites[]`
          schema: { type: string }
        - name: includeDeleted
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Page of users
          content:
            application/json:
              schema:
                type: object
                required: [users, next_page_token]
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        uid: { type: string }
                        email: { type: string, nullable: true }
                        role: { type: string, enum: [member, admin, superadmin] }
                        sites: { type: array, items: { type: string } }
                        deletedAt: { type: integer, nullable: true }
                  next_page_token: { type: string }
                  nextPageToken:
                    type: string
                    deprecated: true
        '400': { description: Invalid filter }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }

  /api/users/bootstrap:
    post:
      tags: [Users]
      summary: bootstrap the caller user document
      description: |
        Creates `users/{uid}` for the authenticated caller on first sign-in
        or sign-up. The uid is taken from the verified session or Firebase
        ID token, not from the request body. This route intentionally does
        not use the platform superadmin handler because a new caller has no
        user document yet.
      security:
        - firebaseIdToken: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                displayName:
                  type: string
                  maxLength: 200
                timezone:
                  type: string
                  maxLength: 100
      responses:
        '200':
          description: User document created, or already existed.
          content:
            application/json:
              schema:
                type: object
                required: [uid, alreadyExists]
                properties:
                  uid: { type: string }
                  alreadyExists: { type: boolean }
                  email: { type: string, nullable: true }
                  displayName: { type: string, nullable: true }
                  timezone: { type: string, nullable: true }
                  createdAt: { type: integer, nullable: true }
        '400': { description: Invalid bootstrap payload }
        '401': { description: Unauthorized }

  /api/users/{uid}:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Users]
      summary: get user detail (superadmin only)
      description: |
        Returns the user's role, site assignments, and metadata. Requires
        `user=*:read` scope or session/id-token from a superadmin user.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200': { description: User detail }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }
    delete:
      tags: [Users]
      summary: soft-delete a user with cascade (superadmin only)
      description: |
        Soft-delete cascade. Sets `deletedAt`, revokes the user's api keys,
        cancels their pending commands (best-effort, async), and transfers
        owned sites to the supplied `successorUid`. Refuses if the user
        owns sites and `successorUid` is not provided (409 `orphan_sites`).

        True-idempotent: re-issuing DELETE on an already-deleted user
        returns 200 with `alreadyDeleted: true`.

        Requires `user=*:admin` scope or session/id-token from a superadmin.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - name: successorUid
          in: query
          required: false
          description: |
            Required when the user owns one or more sites. The successor
            must exist, not be soft-deleted, and have role `admin` or
            `superadmin`.
          schema: { type: string }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Soft-deleted (or already deleted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  uid: { type: string }
                  alreadyDeleted: { type: boolean }
                  deletedAt: { type: integer }
                  transferredSites:
                    type: array
                    items: { type: string }
                  revokedKeyIds:
                    type: array
                    items: { type: string }
        '400': { description: Invalid successor }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }
        '409': { description: Orphan sites (provide successorUid) }

  /api/users/{uid}/promote:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: promote a user to admin or superadmin
      description: |
        Atomic role update via Firestore transaction. Requires `user=*:write`
        scope or session/id-token from a superadmin user.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, superadmin]
      responses:
        '200': { description: Promoted (or noop if already at requested role) }
        '400': { description: Invalid role / soft-deleted target }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }

  /api/users/{uid}/demote:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: demote a user to member
      description: |
        Atomic role update via Firestore transaction. Refuses to demote the
        last active superadmin (409 `last_superadmin`). Requires
        `user=*:write` scope or session/id-token from a superadmin user.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200': { description: Demoted (or noop if already member) }
        '400': { description: Soft-deleted target }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }
        '409': { description: Last superadmin (cannot demote) }

  /api/users/{uid}/assign-sites:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: assign sites to a user
      description: |
        Adds siteIds to `users/{uid}.sites[]` via `arrayUnion` (idempotent
        at the field level). Validates each siteId exists; rejects the
        whole batch if any are unknown. Requires `user=*:write` scope or
        session/id-token from a superadmin user.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteIds]
              properties:
                siteIds:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 100
      responses:
        '200': { description: Sites assigned }
        '400': { description: Validation failure / unknown_site }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }

  /api/users/{uid}/remove-sites:
    parameters:
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    post:
      tags: [Users]
      summary: remove sites from a user
      description: |
        Removes siteIds from `users/{uid}.sites[]` via `arrayRemove`. Best-
        effort cancels pending commands the user issued on those sites
        (failure does not block the response). Requires `user=*:write`
        scope or session/id-token from a superadmin user.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [siteIds]
              properties:
                siteIds:
                  type: array
                  items: { type: string }
                  minItems: 1
                  maxItems: 100
      responses:
        '200': { description: Sites removed }
        '400': { description: Validation failure }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not superadmin) }
        '404': { description: User not found }

  # ──────────────────────────────────────────────────────────────────────
  # Site members (users-api / api-sprint wave 3 — track 3B)
  # ──────────────────────────────────────────────────────────────────────

  /api/sites/{siteId}/members:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [SiteMembers]
      summary: list site members with derived per-site role
      description: |
        Membership lives only on `users/{uid}.sites[]` (per the api-sprint
        wave 0.2 decision). This endpoint resolves it by querying users
        where `sites array-contains <siteId>` and additionally surfaces
        the site `owner` if they aren't already in that set. Per-site
        role is derived: `owner` (always wins), then `superadmin`,
        `admin` (global admin assigned to the site), else `member`.

        Requires `site=<siteId>:admin` scope or session/id-token from an
        admin of this site.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Members
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        uid: { type: string }
                        email: { type: string, nullable: true }
                        role:
                          type: string
                          enum: [owner, superadmin, admin, member]
                        globalRole:
                          type: string
                          enum: [member, admin, superadmin]
                        sites: { type: array, items: { type: string } }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not site admin) }
        '404': { description: Site not found or no access }
    post:
      tags: [SiteMembers]
      summary: add a member to a site
      description: |
        Adds siteId to the target user's `users/{uid}.sites[]` via
        `arrayUnion`. The per-site role is derived from global role at
        read time, so requesting `role: 'admin'` for a member-tier user
        only succeeds in extending membership — the global role is
        unchanged (use `/api/users/{uid}/promote` for that). The
        response includes `roleHonored: false` in that case.

        Requires `site=<siteId>:admin` scope or session/id-token from an
        admin of this site.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid, role]
              properties:
                uid: { type: string }
                role: { type: string, enum: [admin, member] }
      responses:
        '200': { description: Member added }
        '400': { description: Validation failure }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not site admin) }
        '404': { description: User or site not found }

  /api/sites/{siteId}/members/{uid}:
    parameters:
      - name: siteId
        in: path
        required: true
        schema: { type: string }
      - name: uid
        in: path
        required: true
        schema: { type: string }
      - name: Idempotency-Key
        in: header
        required: false
        schema: { type: string }
    delete:
      tags: [SiteMembers]
      summary: remove a member from a site
      description: |
        Removes siteId from the target user's `users/{uid}.sites[]` via
        `arrayRemove`. Refuses to remove the site owner (409
        `cannot_remove_owner`) — use `DELETE /api/users/{uid}?successorUid=<uid>`
        to transfer ownership instead.

        True-idempotent: removing a non-member returns 200 with
        `wasMember: false`.

        Requires `site=<siteId>:admin` scope or session/id-token from an
        admin of this site.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Member removed (or was not a member)
          content:
            application/json:
              schema:
                type: object
                properties:
                  siteId: { type: string }
                  uid: { type: string }
                  wasMember: { type: boolean }
        '401': { description: Unauthorized }
        '403': { description: Forbidden (not site admin) }
        '404': { description: User or site not found }
        '409': { description: Cannot remove site owner }

# ════════════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════════════
components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: x-api-key
      in: header
      description: |
        Legacy api key header — supported for backwards compatibility.
        New integrations should use `bearerApiKey` instead
        (`Authorization: Bearer owk_live_...`).
    bearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: owk_live_* / owk_test_*
      description: |
        Preferred auth mechanism for the public roost api. Send the
        scoped api key as `Authorization: Bearer owk_live_<secret>`
        (production) or `Authorization: Bearer owk_test_<secret>`
        (sandbox). See [authentication.md](../docs/api/authentication.md).
    firebaseIdToken:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: |
        Firebase ID token issued to the authenticated user or agent device.
        Used by dashboard + agent requests to roost endpoints. First-party
        clients only — external integrations use `apiKey` /
        `bearerApiKey` instead.

  parameters:
    SiteIdQuery:
      name: siteId
      in: query
      required: true
      schema:
        type: string
      description: The site ID

    MachineIdQuery:
      name: machineId
      in: query
      required: true
      schema:
        type: string
      description: The machine ID

    ProcessIdPath:
      name: processId
      in: path
      required: true
      schema:
        type: string
      description: The process configuration ID

    DeploymentIdPath:
      name: deploymentId
      in: path
      required: true
      schema:
        type: string
      description: The deployment ID

    PresetIdPath:
      name: presetId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{1,128}$'
      description: The preset ID

    TemplateIdPath:
      name: templateId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{1,128}$'
      description: The deployment template ID

    RoostIdPath:
      name: roostId
      in: path
      required: true
      schema:
        type: string
      description: The roost ID (deploy unit).

    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 255
      description: |
        Client-generated idempotency key. If the server has seen the same
        key on this method, path, query, and request body within the replay
        window, it returns the original response instead of re-executing.

    RequiredIdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 255
      description: |
        Required client-generated idempotency key. If the server has seen
        the same key on this method, path, query, and request body within
        the replay window, it returns the original response instead of
        re-executing.

    RoostVersionHeader:
      name: Roost-Version
      in: header
      required: false
      schema:
        type: string
        pattern: '^\d{4}-\d{2}-\d{2}$'
        example: '2026-04-22'
      description: |
        Selects a dated api version. Optional in wave 1; required once
        a second version ships. See [`GET /api/version`](#tag/utility/operation/getApiVersion).

    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
      description: |
        Optimistic concurrency token. Pass the prior resource version
        (e.g. a `currentVersionId` or opaque etag) to have the server
        reject the mutation with 412 if the resource has changed.

    PageSizeQuery:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum items per page.

    PageTokenQuery:
      name: page_token
      in: query
      required: false
      schema:
        type: string
      description: |
        Opaque cursor from the prior response's `next_page_token`. An
        empty string means no more pages.

    KeyIdPath:
      name: keyId
      in: path
      required: true
      schema:
        type: string
        pattern: '^key_[A-Z0-9]+$'
      description: The api key id (ulid-encoded).

    WebhookIdPath:
      name: webhookId
      in: path
      required: true
      schema:
        type: string
        pattern: '^whk_[A-Z0-9]+$'
      description: Webhook subscription id (ulid-encoded).

    DeliveryIdPath:
      name: deliveryId
      in: path
      required: true
      schema:
        type: string
        pattern: '^whd_[A-Z0-9]+$'
      description: Webhook delivery id (ulid-encoded).

    RolloutIdPath:
      name: rolloutId
      in: path
      required: true
      schema:
        type: string
        pattern: '^rollout_[A-Z0-9]+$'
      description: Rollout (deployment) id (ulid-encoded).

    SiteIdPath:
      name: siteId
      in: path
      required: true
      schema:
        type: string
      description: Site id (path param variant; distinct from the `siteId` query parameter).

    MachineIdSitePath:
      name: machineId
      in: path
      required: true
      schema:
        type: string
      description: Machine id (path param on `/api/sites/{siteId}/machines/{machineId}`).

    VersionRefPath:
      name: versionRef
      in: path
      required: true
      schema:
        type: string
      description: |
        Addresses a version on the roost. Accepts any of:
          - a stable content-addressed id: 64-char sha-256 hex
          - a legacy stable id alias: `vrs_<hex>`
          - a version number: `3`, `#3`, `v3`, or `V3`
          - a roost-relative alias: `current`, `previous`, `first`
        Malformed refs return 400 `version_ref_malformed`;
        unmatched refs return 404 `version_not_found`.

    DigestPath:
      name: digest
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9a-f]{64}$'
      description: Chunk digest as lowercase sha-256 hex, without `sha256:`.

    RecordHashPath:
      name: recordHash
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9a-f]{64}$'
      description: Audit record hash as raw lowercase sha-256 hex.

  headers:
    RateLimitLimit:
      description: Window limit for the rate-limit bucket that fired for this request.
      schema:
        type: integer
    RateLimitRemaining:
      description: Calls remaining in the current window.
      schema:
        type: integer
    RateLimitReset:
      description: Seconds until the current window fully resets.
      schema:
        type: integer
    RetryAfter:
      description: Seconds the client should wait before retrying (429 only).
      schema:
        type: integer
    RoostRateLimitedReason:
      description: |
        Which rate-limit bucket tripped (`global-rate`, `endpoint-rate`,
        `key-rate`, `site-concurrency`). Present only on 429.
      schema:
        type: string
        enum: [global-rate, endpoint-rate, key-rate, site-concurrency]

  responses:
    Problem400:
      description: Validation failed.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem401:
      description: Authentication required.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem402:
      description: Quota exceeded.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem403:
      description: Forbidden (e.g. cross-site access).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem404:
      description: Resource not found.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem409:
      description: Conflict (e.g. no previous version to roll back to).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem412:
      description: Precondition failed (optimistic concurrency miss on finalize).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem413:
      description: |
        Payload too large or quota-bound size limit exceeded — e.g. a
        deployment with more target machines than the per-site quota
        allows. The body carries `code: over_quota` and a `quota` block
        describing the active limit.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem422:
      description: |
        Request semantics violated a constraint — e.g. an `Idempotency-Key`
        was reused with a different request body (`code: idempotency_key_mismatch`).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem429:
      description: Rate limited.
      headers:
        RateLimit-Limit:           { $ref: '#/components/headers/RateLimitLimit' }
        RateLimit-Remaining:       { $ref: '#/components/headers/RateLimitRemaining' }
        RateLimit-Reset:           { $ref: '#/components/headers/RateLimitReset' }
        Retry-After:               { $ref: '#/components/headers/RetryAfter' }
        Roost-Rate-Limited-Reason: { $ref: '#/components/headers/RoostRateLimitedReason' }
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem500:
      description: Internal server error.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Problem501:
      description: |
        Endpoint is scaffolded but the backing infrastructure is not yet
        provisioned (current state for roost stubs pending wave 0.5/0.6).
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      example:
        error: Description of what went wrong

    Site:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        machineCount:
          type: integer

    Machine:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        online:
          type: boolean
        lastHeartbeat:
          type: string
          format: date-time
        agentVersion:
          type: string
        os:
          type: string

    Process:
      type: object
      required: [processId, name, exe_path, launch_mode, status]
      properties:
        processId:
          type: string
        id:
          type: string
          nullable: true
          deprecated: true
        name:
          type: string
        exe_path:
          type: string
        file_path:
          type: string
        cwd:
          type: string
        priority:
          type: string
        visibility:
          type: string
        time_delay:
          type: string
        time_to_init:
          type: string
        relaunch_attempts:
          type: string
        autolaunch:
          type: boolean
        launch_mode:
          type: string
          enum: [off, always, scheduled]
        schedules:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/ProcessScheduleBlock' }
        schedule:
          type: object
          nullable: true
          additionalProperties: true
        schedulePresetId:
          type: string
          nullable: true
        status:
          type: string
        pid:
          type: integer
          nullable: true
        responsive:
          type: boolean
        last_updated:
          nullable: true
          oneOf:
            - type: string
            - type: number

    ProcessScheduleBlock:
      type: object
      required: [days, ranges]
      properties:
        name:
          type: string
        colorIndex:
          type: number
        days:
          type: array
          items: { type: string }
        ranges:
          type: array
          items:
            type: object
            required: [start, stop]
            properties:
              start: { type: string }
              stop: { type: string }

    Schedule:
      type: object
      properties:
        days:
          type: array
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        startTime:
          type: string
          description: 24-hour time (HH:MM)
          example: "08:00"
        endTime:
          type: string
          description: 24-hour time (HH:MM)
          example: "18:00"

    ScheduleTimeRange:
      type: object
      required: [start, end]
      properties:
        start:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "09:00"
        end:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "17:00"

    ScheduleBlock:
      type: object
      required: [days, ranges]
      properties:
        name: { type: string }
        colorIndex: { type: number }
        days:
          type: array
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        ranges:
          type: array
          items: { $ref: '#/components/schemas/ScheduleTimeRange' }

    SchedulePresetInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        blocks:
          type: array
          items: { $ref: '#/components/schemas/ScheduleBlock' }
          default: []
        isBuiltIn:
          type: boolean
          default: false
        order:
          type: number
          default: 0

    SchedulePresetPatch:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        blocks:
          type: array
          items: { $ref: '#/components/schemas/ScheduleBlock' }
        isBuiltIn: { type: boolean }
        order: { type: number }

    SchedulePreset:
      allOf:
        - $ref: '#/components/schemas/SchedulePresetInput'
        - type: object
          required: [id, blocks, isBuiltIn, order, createdBy, createdAt]
          properties:
            id: { type: string }
            createdBy: { type: string }
            createdAt:
              type: string
              format: date-time
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true

    RebootScheduleEntry:
      type: object
      required: [id, days, time]
      properties:
        id: { type: string }
        days:
          type: array
          items:
            type: string
            enum: [mon, tue, wed, thu, fri, sat, sun]
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: "03:00"

    RebootPresetInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
        entries:
          type: array
          items: { $ref: '#/components/schemas/RebootScheduleEntry' }
          default: []
        isBuiltIn:
          type: boolean
          default: false
        order:
          type: number
          default: 0

    RebootPresetPatch:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        entries:
          type: array
          items: { $ref: '#/components/schemas/RebootScheduleEntry' }
        isBuiltIn: { type: boolean }
        order: { type: number }

    RebootPreset:
      allOf:
        - $ref: '#/components/schemas/RebootPresetInput'
        - type: object
          required: [id, entries, isBuiltIn, order, createdBy, createdAt]
          properties:
            id: { type: string }
            createdBy: { type: string }
            createdAt:
              type: string
              format: date-time
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true

    DeploymentTemplateInput:
      type: object
      required: [name, installer_name, installer_url, silent_flags]
      properties:
        name: { type: string }
        installer_name: { type: string }
        installer_url:
          type: string
          format: uri
          description: Must use `https://`.
        silent_flags: { type: string }
        verify_path:
          type: string
          nullable: true
        close_processes:
          type: array
          items: { type: string }
        parallel_install: { type: boolean }

    DeploymentTemplatePatch:
      type: object
      properties:
        name: { type: string }
        installer_name: { type: string }
        installer_url:
          type: string
          format: uri
        silent_flags: { type: string }
        verify_path:
          type: string
          nullable: true
        close_processes:
          type: array
          items: { type: string }
        parallel_install: { type: boolean }

    DeploymentTemplate:
      allOf:
        - $ref: '#/components/schemas/DeploymentTemplateInput'
        - type: object
          required: [id, name, installer_name, installer_url, silent_flags, createdAt]
          properties:
            id: { type: string }
            close_processes:
              type: array
              items: { type: string }
              nullable: true
            createdAt:
              type: string
              format: date-time
              nullable: true
            updatedAt:
              type: string
              format: date-time
              nullable: true

    DeploymentSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        installer_name:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, partial, partial_failed, cancelled, uninstalled]
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds

    Deployment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        installer_name:
          type: string
        installer_url:
          type: string
          format: uri
        silent_flags:
          type: string
        verify_path:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed, failed, partial, partial_failed, cancelled, uninstalled]
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds
        targets:
          type: array
          items:
            type: object
            properties:
              machineId:
                type: string
              status:
                type: string
              progress:
                type: integer
                description: Download progress percentage (0-100)
              completedAt:
                type: integer
                description: Unix timestamp in milliseconds

    Webhook:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [process_crash, machine_offline, connection_failure]
        createdAt:
          type: string
          format: date-time

    ApiKeyMetadata:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
          description: First few characters of the key for identification
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    SystemPresetInput:
      type: object
      required:
        - name
        - software_name
        - category
        - installer_name
        - installer_url
        - silent_flags
        - is_owlette_agent
        - order
      properties:
        name: { type: string }
        software_name: { type: string }
        category: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        installer_name: { type: string }
        installer_url: { type: string }
        silent_flags: { type: string }
        verify_path: { type: string, nullable: true }
        close_processes:
          type: array
          items: { type: string }
        parallel_install: { type: boolean }
        is_owlette_agent: { type: boolean }
        timeout_seconds: { type: integer, nullable: true }
        order: { type: integer }

    SystemPreset:
      allOf:
        - $ref: '#/components/schemas/SystemPresetInput'
        - type: object
          properties:
            id: { type: string }
            createdBy: { type: string }
            createdAt: { type: string, format: date-time, nullable: true }
            updatedAt: { type: string, format: date-time, nullable: true }

    AlertRule:
      type: object
      required:
        - id
        - name
        - metric
        - operator
        - value
        - severity
        - channels
        - enabled
        - cooldownMinutes
      properties:
        id: { type: string }
        name: { type: string }
        metric: { type: string }
        operator: { type: string, enum: ['>', '<', '>=', '<='] }
        value: { type: number }
        severity: { type: string, enum: [info, warning, critical] }
        channels:
          type: array
          items: { type: string, enum: [email, webhook] }
        enabled: { type: boolean }
        cooldownMinutes: { type: number, minimum: 0 }

    InstallerVersion:
      type: object
      required: [version, download_url, checksum_sha256, file_size, uploaded_at, uploaded_by, release_date, deletedAt]
      properties:
        version:
          type: string
        download_url:
          type: string
          format: uri
          nullable: true
        checksum_sha256:
          type: string
          nullable: true
        release_notes:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        uploaded_at:
          type: integer
          nullable: true
        uploaded_by:
          type: string
          nullable: true
        release_date:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: integer
          nullable: true
        promoted_at:
          type: integer
          nullable: true
        promoted_by:
          type: string
          nullable: true

    McpTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        tier:
          type: integer
          enum: [1, 2, 3]
          description: "1 = read-only, 2 = actions, 3 = advanced"
        parameters:
          type: object
          description: JSON Schema for tool parameters

    # ── roost (project distribution v2) ─────────────────────────────
    DisplayMonitor:
      type: object
      description: |
        Monitor topology record reported by the agent and stored as a
        machine-level assigned layout. The agent remains the source of
        truth for vendor-specific fields; public callers should preserve
        unknown properties returned by display state tooling.
      additionalProperties: true
      properties:
        id: { type: string }
        deviceName: { type: string }
        primary: { type: boolean }
        position:
          type: object
          properties:
            x: { type: number }
            y: { type: number }
        width: { type: integer, minimum: 0 }
        height: { type: integer, minimum: 0 }
        scale: { type: number }
        orientation: { type: string }

    DisplayLayoutOperationResult:
      type: object
      required: [machineId, op]
      properties:
        machineId: { type: string }
        op:
          type: string
          enum: [capture, set_auto_restore, reset_breaker, set_remote_apply]

    ProblemDetails:
      type: object
      description: |
        RFC 7807 problem+json envelope returned by public API endpoints on
        error. This carries a stable machine-readable `type` URI, `code`,
        docs link, correlation `requestId`, and optional field-level
        `errors`.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: Stable URI identifying the problem category.
          example: https://owlette.app/problems/validation-failed
        title:
          type: string
          description: Short, stable human-readable summary.
          example: validation failed
        status:
          type: integer
          description: HTTP status code, mirrors the response status.
          example: 400
        detail:
          type: string
          description: Occurrence-specific explanation; safe to show to users.
        instance:
          type: string
          description: URI reference for this occurrence (often the route path).
        requestId:
          type: string
          description: Correlation ID for trace lookup; quote in support tickets.
        code:
          type: string
          description: Stable machine-readable code for client branching.
          example: validation_failed
        docsUrl:
          type: string
          format: uri
          description: Documentation anchor for the error code.
          example: https://owlette.app/docs/api/errors#validation_failed
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: |
            Field-level errors keyed by dotted JSON path (400/422 responses).
            Example: `{ "body.hashes": ["must be a non-empty array"] }`

    VersionSummary:
      type: object
      description: Entry in a roost's immutable version history.
      required: [versionId, versionNumber, createdAt, totalSize, totalFiles]
      properties:
        versionId:
          type: string
          description: Stable content-addressed id (`vrs_*`).
        versionNumber:
          type: integer
          description: Monotonic 1-indexed version number, per-roost.
        description:
          type: string
          nullable: true
          maxLength: 500
          description: |
            Optional plaintext "what changed?" note supplied at publish
            time or edited later via PATCH. Null when missing.
        versionUrl:
          type: string
          format: uri
          description: R2 URL of the version body (short-TTL signed).
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: UID of the user or agent that published this version.
        totalSize:
          type: integer
          format: int64
          description: Sum of all file sizes in bytes.
        totalFiles:
          type: integer
        parentVersionId:
          type: string
          nullable: true

    OciVersion:
      type: object
      description: |
        OCI Image v1.1 derivation — owlette surfaces this as "version". See
        [version-format.md](../docs/internal/version-format.md) for the
        full schema. This OpenAPI description captures the shape required
        by the finalize endpoint; the authoritative JSON schema lives in
        the internal docs.
      required: [schemaVersion, mediaType, config, files]
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        mediaType:
          type: string
          enum: [application/vnd.owlette.version.v1+json]
        config:
          type: object
          required: [name, createdAt, createdBy, siteId]
          properties:
            name:
              type: string
            createdAt:
              type: string
              format: date-time
            createdBy:
              type: string
            siteId:
              type: string
        files:
          type: array
          items:
            type: object
            required: [path, size, chunks]
            properties:
              path:
                type: string
                description: |
                  POSIX-style relative path. Agents reject absolute paths,
                  `..`, `.`, empty segments, NUL bytes, drive letters, and
                  ADS colons.
              size:
                type: integer
                format: int64
                minimum: 0
              chunks:
                type: array
                items:
                  type: object
                  required: [hash, size]
                  properties:
                    hash:
                      type: string
                      pattern: '^[0-9a-f]{64}$'
                    size:
                      type: integer
                      minimum: 1

    # ── public roost api schemas (wave 1) ───────────────────────────

    # Common primitives.
    Permission:
      type: string
      enum: [read, write, deploy, rollback, admin]
      description: |
        Atomic permission within a scope entry. `admin` is the
        superset; `deploy` implies `read`; `write` implies `read`.
    Scope:
      type: object
      description: |
        One entry on an api key's `scopes[]`. The set of scopes on a
        key is the union of access granted.
      required: [resource, id, permissions]
      properties:
        resource:
          type: string
          enum: [roost, site, machine, chat, deploy, process, user, installer]
          description: Resource type this entry grants against.
        id:
          type: string
          description: |
            Specific resource id or `*` to match any resource of the
            given type within the caller's own access. Platform resources
            `user` and `installer` must use `*`.
        permissions:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Permission' }

    Cursor:
      type: string
      description: |
        Opaque pagination cursor. Not a stable format — clients must
        round-trip the exact bytes without parsing.

    # api keys
    ApiKey:
      type: object
      required: [id, name, environment, keyPrefix, scopes, createdAt]
      properties:
        id:            { type: string }
        name:          { type: string, maxLength: 128 }
        environment:
          type: string
          enum: [live, test]
        keyPrefix:
          type: string
          description: First ~14 chars of the raw key; safe to display.
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        lastUsedIp:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
          nullable: true
    ApiKeyWithSecret:
      description: |
        Returned **only** on create or rotate — the one and only time
        the raw `key` value is exposed. Subsequent reads return
        `keyPrefix` only.
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required: [key]
          properties:
            key:
              type: string
              description: Raw api key (`owk_live_*` or `owk_test_*`). Store immediately.
            previousKeyExpiresAt:
              type: string
              format: date-time
              nullable: true
              description: Rotation grace window end (rotate only; null on create).
            rotatedAt:
              type: string
              format: date-time
              nullable: true
              description: Timestamp of the rotation (rotate only; null on create).
    ApiKeyCreateResponse:
      type: object
      required: [success, key, keyId, name, environment, scopes, expiresAt, keyPrefix]
      properties:
        success: { type: boolean }
        key:
          type: string
          description: Raw api key (`owk_live_*` or `owk_test_*`). Store immediately.
        keyId: { type: string }
        name: { type: string }
        environment:
          type: string
          enum: [live, test]
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
        expiresAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds.
        keyPrefix: { type: string }
    ApiKeyRotateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiKeyCreateResponse'
        - type: object
          required: [rotatedFromKeyId, previousKey]
          properties:
            rotatedFromKeyId: { type: string }
            previousKey:
              type: object
              required: [keyId, retiresAt]
              properties:
                keyId: { type: string }
                retiresAt:
                  type: integer
                  format: int64
                  description: Unix timestamp in milliseconds when the old key stops working.
    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:          { type: string, maxLength: 128 }
        environment:
          type: string
          enum: [live, test]
          default: live
        scopes:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/Scope' }
        ttlDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 90
    PatchApiKeyRequest:
      type: object
      description: |
        Any combination of `name` and `scopes` may be provided. Scopes
        may only be narrowed; broadening returns 400.
      properties:
        name:   { type: string, maxLength: 128 }
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
    RotateApiKeyRequest:
      type: object
      properties:
        ttlDays:
          type: integer
          minimum: 1
          maximum: 365
          default: 90

    # roosts
    RoostSummary:
      type: object
      required: [id, siteId, name, targets, totalSize, totalFiles, updatedAt]
      properties:
        id:       { type: string }
        siteId:   { type: string }
        name:     { type: string }
        targets:
          type: array
          items: { type: string }
        currentVersionId:
          type: string
          nullable: true
          pattern: '^[0-9a-f]{64}$'
        previousVersionId:
          type: string
          nullable: true
          pattern: '^[0-9a-f]{64}$'
        totalSize:
          type: integer
          format: int64
          minimum: 0
        totalFiles:
          type: integer
          minimum: 0
        updatedAt:
          type: string
          format: date-time
    Roost:
      description: Full roost detail. Extends `RoostSummary` with `createdAt`.
      allOf:
        - $ref: '#/components/schemas/RoostSummary'
        - type: object
          required: [createdAt]
          properties:
            createdAt:
              type: string
              format: date-time
    CreateRoostRequest:
      type: object
      required: [siteId, name]
      properties:
        siteId:  { type: string }
        name:
          type: string
          maxLength: 128
          description: Display name. Must be unique within the site.
        targets:
          type: array
          items: { type: string }
          description: Machine ids to target; may be empty at create time.
    PatchRoostRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 128
        targets:
          type: array
          items: { type: string }

    # versions
    VersionFile:
      type: object
      required: [path, digest, size]
      properties:
        path:   { type: string }
        digest:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        size:
          type: integer
          format: int64
          minimum: 0
    Version:
      description: |
        Full oci-style version body. Roost emits schemaVersion 2,
        mediaType `application/vnd.owlette.version.v1+json`. See
        [versions.md](../docs/api/versions.md).
      type: object
      required: [schemaVersion, mediaType, config, layers]
      properties:
        schemaVersion:
          type: integer
          enum: [2]
        mediaType:
          type: string
          enum: [application/vnd.owlette.version.v1+json]
        config:
          type: object
          required: [mediaType, digest, size]
          properties:
            mediaType: { type: string }
            digest:
              type: string
              pattern: '^sha256:[0-9a-f]{64}$'
            size:
              type: integer
              format: int64
              minimum: 0
        layers:
          type: array
          items:
            type: object
            required: [mediaType, path, digest, size]
            properties:
              mediaType: { type: string }
              path:      { type: string }
              digest:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
              size:
                type: integer
                format: int64
                minimum: 0
    VersionDetail:
      description: Version metadata wrapper returned on GET.
      type: object
      required: [id, versionNumber, publishedAt, totalSize, totalFiles, isCurrent, version]
      properties:
        id:
          type: string
          description: Stable content-addressed id (64-char sha-256 hex).
        versionNumber:
          type: integer
          description: Monotonic 1-indexed version number, per-roost.
        description:
          type: string
          nullable: true
          maxLength: 500
          description: |
            Optional plaintext "what changed?" note. Editable via PATCH.
        publishedAt:
          type: string
          format: date-time
        publishedBy:
          type: string
          description: User or api key id that published this version.
        totalSize:
          type: integer
          format: int64
        totalFiles:
          type: integer
        isCurrent:
          type: boolean
        version: { $ref: '#/components/schemas/Version' }
    DiffResult:
      type: object
      required: [from, to, added, removed, modified]
      properties:
        from:
          type: string
          pattern: '^[0-9a-f]{64}$'
        to:
          type: string
          pattern: '^[0-9a-f]{64}$'
        added:
          type: array
          items: { $ref: '#/components/schemas/VersionFile' }
        removed:
          type: array
          items: { $ref: '#/components/schemas/VersionFile' }
        modified:
          type: array
          items:
            type: object
            required: [path, digestBefore, digestAfter, sizeBefore, sizeAfter]
            properties:
              path: { type: string }
              digestBefore:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
              digestAfter:
                type: string
                pattern: '^sha256:[0-9a-f]{64}$'
              sizeBefore:
                type: integer
                format: int64
              sizeAfter:
                type: integer
                format: int64

    # chunks
    ChunkReferrer:
      type: object
      required: [entryId, source]
      properties:
        entryId: { type: string }
        source:
          type: string
          enum: [version, mount]
        roostId:
          type: string
          nullable: true
        fromRoostId:
          type: string
          nullable: true
        toRoostId:
          type: string
          nullable: true
        versionId:
          type: string
          nullable: true
          pattern: '^[0-9a-f]{64}$'
        versionNumber:
          type: integer
          nullable: true
        fileCount:
          type: integer
          nullable: true
          minimum: 1
          description: How many files in that version reference this chunk.
        referencedAt:
          type: string
          format: date-time
          nullable: true
    MountChunkRequest:
      type: object
      required: [siteId, toRoostId]
      properties:
        siteId:    { type: string }
        toRoostId: { type: string }

    # deployments
    MachineDeploymentState:
      type: object
      required: [machineId, state]
      properties:
        machineId: { type: string }
        role:
          type: string
          enum: [canary, fleet]
        state:
          type: string
          enum: [queued, in_progress, succeeded, failed, cancelled, simulated]
        syncStartedAt:
          type: string
          format: date-time
          nullable: true
        syncCompletedAt:
          type: string
          format: date-time
          nullable: true
        bytesTransferred:
          type: integer
          format: int64
          minimum: 0
        error:
          type: string
          nullable: true
    DeployRequest:
      type: object
      required: [siteId, versionId]
      properties:
        siteId: { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        machines:
          type: array
          items: { type: string }
          description: Subset of the roost's targets. Omit to target all.
        scheduleAt:
          type: string
          format: date-time
          nullable: true
          description: Future timestamp to queue the rollout for.
        dryRun:
          type: boolean
          default: false
        strategy:
          type: string
          enum: [all-at-once, canary-then-fleet, canary-only]
          default: all-at-once
    DeploymentPlan:
      description: |
        Initial rollout response (202 Accepted). For ongoing status
        polling, call `GET /api/roosts/{roostId}/deployments/{rolloutId}`.
      type: object
      required: [rolloutId, roostId, versionId, strategy, dryRun, createdAt, machines]
      properties:
        rolloutId: { type: string }
        roostId:   { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        strategy:
          type: string
          enum: [all-at-once, canary-then-fleet, canary-only]
        dryRun:    { type: boolean }
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        machines:
          type: array
          items: { $ref: '#/components/schemas/MachineDeploymentState' }
    DeploymentStatus:
      description: |
        Current state snapshot for a rollout — used by both the list
        endpoint and the detail endpoint (detail populates
        `machines[]`; list omits them to keep payloads small).
      type: object
      required: [rolloutId, roostId, versionId, strategy, state, startedAt]
      properties:
        rolloutId: { type: string }
        roostId:   { type: string }
        versionId:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        strategy:
          type: string
          enum: [all-at-once, canary-then-fleet, canary-only]
        state:
          type: string
          enum: [queued, in_progress, succeeded, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        machineCount:
          type: integer
          minimum: 0
        successCount:
          type: integer
          minimum: 0
        failureCount:
          type: integer
          minimum: 0
        machines:
          type: array
          items: { $ref: '#/components/schemas/MachineDeploymentState' }
          description: Populated on detail responses only.
    DryRunResult:
      description: |
        Returned when `DeployRequest.dryRun: true`. Same shape as
        `DeploymentPlan` but every machine is in `state: simulated`
        and no agent is contacted. Included as a distinct schema for
        sdk code-gen clarity.
      allOf:
        - $ref: '#/components/schemas/DeploymentPlan'
    InstallerDeploymentTarget:
      type: object
      required: [machineId, status]
      properties:
        machineId: { type: string }
        status:
          type: string
          enum:
            - pending
            - closing_processes
            - downloading
            - installing
            - completed
            - failed
            - cancelled
            - uninstalled
        error:
          type: string
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        retriedAt:
          type: string
          format: date-time
          nullable: true
      additionalProperties: true
    InstallerDeploymentSummary:
      type: object
      required:
        - id
        - name
        - installer_name
        - installer_url
        - silent_flags
        - verify_path
        - sha256_checksum
        - parallel_install
        - targets
        - status
        - createdAt
        - completedAt
        - updatedAt
      properties:
        id: { type: string }
        name: { type: string }
        installer_name: { type: string }
        installer_url:
          type: string
          format: uri
        silent_flags: { type: string }
        verify_path:
          type: string
          nullable: true
        sha256_checksum:
          type: string
          nullable: true
        parallel_install: { type: boolean }
        targets:
          type: array
          items: { $ref: '#/components/schemas/InstallerDeploymentTarget' }
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
            - failed
            - partial
            - partial_failed
            - cancelled
            - uninstalling
            - uninstalled
        createdAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    InstallerDeploymentDetail:
      allOf:
        - $ref: '#/components/schemas/InstallerDeploymentSummary'
        - type: object
          required: [siteId]
          properties:
            siteId: { type: string }

    # sites
    SiteSummary:
      type: object
      required: [id, name]
      properties:
        id:       { type: string }
        name:     { type: string }
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
          nullable: true
        timezone:
          type: string
          nullable: true
          description: IANA tz name.
        owner:
          type: string
          nullable: true
          description: User id that owns the site.
        createdAt:
          type: string
          format: date-time
          nullable: true
    SiteDetail:
      description: Site detail currently shares the live `SiteSummary` shape.
      allOf:
        - $ref: '#/components/schemas/SiteSummary'

    # machines
    MachineSummary:
      type: object
      required: [id, name, online]
      properties:
        id:     { type: string }
        name:   { type: string }
        online: { type: boolean }
        lastHeartbeat:
          type: string
          format: date-time
          nullable: true
        agentVersion:
          type: string
          nullable: true
        os:
          type: string
          nullable: true
        currentRoosts:
          type: array
          items:
            type: object
            required: [roostId, name, currentVersionId, versionCounter]
            properties:
              roostId: { type: string }
              name: { type: string }
              currentVersionId:
                type: string
                nullable: true
              versionCounter:
                type: integer
                minimum: 0
    MachineDetail:
      description: Full machine detail; extends `MachineSummary` with telemetry.
      allOf:
        - $ref: '#/components/schemas/MachineSummary'
        - type: object
          properties:
            siteId: { type: string }
            hostname:
              type: string
              nullable: true
            metrics:
              type: object
              nullable: true
              additionalProperties: true
            processes:
              type: array
              items:
                type: object
                additionalProperties: true
    MachineDeployment:
      description: Current state for one roost that targets a machine.
      type: object
      required: [roostId, name, currentVersionId, previousVersionId, versionCounter, extractPath, reportedVersionId, reportedStatus, reportedAt]
      properties:
        roostId: { type: string }
        name: { type: string }
        currentVersionId:
          type: string
          nullable: true
        previousVersionId:
          type: string
          nullable: true
        versionCounter:
          type: integer
          minimum: 0
        extractPath:
          type: string
          nullable: true
        reportedVersionId:
          type: string
          nullable: true
        reportedStatus:
          type: string
          nullable: true
        reportedAt:
          type: string
          format: date-time
          nullable: true
    RemoveMachineResult:
      type: object
      required: [siteId, machineId, deleted]
      properties:
        siteId: { type: string }
        machineId: { type: string }
        deleted:
          type: object
          required: [machine, config, pendingCommands, completedCommands]
          properties:
            machine: { type: string }
            config: { type: string }
            pendingCommands: { type: string }
            completedCommands: { type: string }

    # quotas
    Quota:
      type: object
      required: [siteId, tier, limitBytes, usedBytes]
      properties:
        siteId: { type: string }
        tier:
          type: string
          enum: [free, starter, pro, enterprise]
        limitBytes:
          type: integer
          format: int64
          minimum: 0
        usedBytes:
          type: integer
          format: int64
          minimum: 0
        pendingBytes:
          type: integer
          format: int64
          minimum: 0
          description: Bytes reserved by in-flight uploads but not yet persisted.
        bandwidthLimitBytesPerMonth:
          type: integer
          format: int64
          minimum: 0
        bandwidthUsedBytesThisMonth:
          type: integer
          format: int64
          minimum: 0
        alarms:
          type: array
          items:
            type: object
            required: [threshold, firedAt]
            properties:
              threshold:
                type: number
                minimum: 0
                maximum: 1
                description: Fraction of `limitBytes` at which this alarm fired.
              firedAt:
                type: string
                format: date-time
        periodResetsAt:
          type: string
          format: date-time
    QuotaHistoryEntry:
      type: object
      required: [date, usedBytes, bandwidthBytes]
      properties:
        date:
          type: string
          format: date
          description: UTC calendar date (YYYY-MM-DD).
        usedBytes:
          type: integer
          format: int64
          minimum: 0
        bandwidthBytes:
          type: integer
          format: int64
          minimum: 0

    # operational logs
    SiteLogEntry:
      type: object
      required: [id, siteId, timestamp, action, level, machineId, machineName, processName, details, userId, screenshotUrl]
      properties:
        id: { type: string }
        siteId: { type: string }
        timestamp:
          type: string
          format: date-time
          nullable: true
        action:
          type: string
          description: Event action, e.g. `process_crash` or `agent_started`.
        level:
          type: string
          enum: [debug, info, warning, error, critical]
        machineId:
          type: string
          nullable: true
        machineName:
          type: string
          nullable: true
        processName:
          type: string
          nullable: true
        details:
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
          nullable: true
        userId:
          type: string
          nullable: true
        screenshotUrl:
          type: string
          format: uri
          nullable: true

    # audit log
    AuditRecord:
      type: object
      required: [hash, kind, actor, siteId, target, occurredAt, recordedAt, attributes]
      properties:
        hash:
          type: string
          pattern: '^[0-9a-f]{64}$'
        kind:
          type: string
          enum:
            - signed_url_issued
            - distribution_started
            - version_pointer_changed
            - api_key_used
            - gc_run
            - api_key_mutated
            - chunk_mutated
            - deployment_mutated
            - distribution_mutated
            - process_mutated
            - roost_mutated
            - machine_command_dispatched
            - user_mutated
            - site_mutated
            - site_member_mutated
            - installer_mutated
            - webhook_mutated
            - chat_mutated
        actor:
          type: string
          description: Actor identifier such as `user:<uid>` or `apiKey:<keyId>`.
        siteId: { type: string }
        target:
          type: string
          nullable: true
          description: Optional mutated resource id for mutation audit records.
        occurredAt:
          type: integer
          format: int64
          nullable: true
        recordedAt:
          type: integer
          format: int64
          nullable: true
        attributes:
          type: object
          description: |
            Kind-specific structured detail. Additional properties
            depend on `kind`; treat unknown keys as forward-compatible.
          additionalProperties: true
    AuditRecordDetail:
      type: object
      required: [siteId, hash, previousHash, recordedAt, event, verification]
      properties:
        siteId: { type: string }
        hash:
          type: string
          pattern: '^[0-9a-f]{64}$'
        previousHash:
          type: string
          pattern: '^[0-9a-f]{64}$'
        recordedAt:
          type: integer
          format: int64
        event:
          type: object
          required: [kind, siteId, actor, occurredAt, attributes]
          properties:
            kind:
              type: string
              enum:
                - signed_url_issued
                - distribution_started
                - version_pointer_changed
                - api_key_used
                - gc_run
                - api_key_mutated
                - chunk_mutated
                - deployment_mutated
                - distribution_mutated
                - process_mutated
                - roost_mutated
                - machine_command_dispatched
                - user_mutated
                - site_mutated
                - site_member_mutated
                - installer_mutated
                - webhook_mutated
                - chat_mutated
            siteId: { type: string }
            actor: { type: string }
            target:
              type: string
              description: Optional mutated resource id for mutation audit records.
            occurredAt:
              type: integer
              format: int64
            attributes:
              type: object
              additionalProperties: true
        verification:
          type: object
          required: [ok, hashValid, linkageValid, isGenesis, predecessorPresent, reason]
          properties:
            ok: { type: boolean }
            hashValid: { type: boolean }
            linkageValid:
              type: boolean
              nullable: true
            isGenesis: { type: boolean }
            predecessorPresent: { type: boolean }
            reason:
              type: string
              nullable: true

    # webhooks
    WebhookDeliveryStatus:
      type: string
      enum: [pending, success, failed]
    WebhookSubscription:
      description: |
        Base webhook subscription fields. Most reads return the
        `Webhook` wrapper which extends this with activity pointers;
        `WebhookWithSecret` extends with the one-time raw secret.
      type: object
      required: [id, siteId, url, events, paused, createdAt]
      properties:
        id:          { type: string }
        siteId:      { type: string }
        url:
          type: string
          format: uri
          description: Must be https — no private / loopback ips.
        events:
          type: array
          minItems: 1
          items: { type: string }
        description:
          type: string
          nullable: true
        paused:
          type: boolean
          default: false
        secretPrefix:
          type: string
          description: First few chars of the signing secret for identification.
        createdAt:
          type: string
          format: date-time
    WebhookDetail:
      description: |
        Webhook subscription wrapper with activity pointers. Returned
        on `GET /api/webhooks` and `GET /api/webhooks/{webhookId}`.
      allOf:
        - $ref: '#/components/schemas/WebhookSubscription'
        - type: object
          properties:
            lastDeliveryAt:
              type: string
              format: date-time
              nullable: true
            lastDeliveryOk:
              type: boolean
              nullable: true
            consecutiveFailures:
              type: integer
              minimum: 0
    WebhookWithSecret:
      description: |
        Returned **only** on webhook create and `rotate-secret`. The
        `signingSecret` is the full hmac secret — store it immediately.
      allOf:
        - $ref: '#/components/schemas/WebhookSubscription'
        - type: object
          required: [signingSecret]
          properties:
            signingSecret:
              type: string
              description: HMAC signing secret (`whsec_*`). Shown once.
            previousSecretExpiresAt:
              type: string
              format: date-time
              nullable: true
            rotatedAt:
              type: string
              format: date-time
              nullable: true
    CreateWebhookRequest:
      type: object
      required: [siteId, url, events]
      properties:
        siteId: { type: string }
        url:
          type: string
          format: uri
          description: Must be https — no private ips; reachable during create-time smoke test.
        events:
          type: array
          minItems: 1
          items: { type: string }
        description:
          type: string
          maxLength: 256
    PatchWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items: { type: string }
        description:
          type: string
          maxLength: 256
          nullable: true
        paused:
          type: boolean
    WebhookDelivery:
      type: object
      required: [deliveryId, event, status, attemptCount, deliveredAt]
      properties:
        deliveryId: { type: string }
        webhookId:  { type: string }
        event:      { type: string }
        status:     { $ref: '#/components/schemas/WebhookDeliveryStatus' }
        responseStatus:
          type: integer
          nullable: true
          description: HTTP status the target returned. Null if the attempt never connected.
        attemptCount:
          type: integer
          minimum: 1
        deliveredAt:
          type: string
          format: date-time
        nextRetryAt:
          type: string
          format: date-time
          nullable: true
        durationMs:
          type: integer
          minimum: 0
        error:
          type: string
          nullable: true
        request:
          type: object
          description: Populated on detail responses only.
          properties:
            url:     { type: string, format: uri }
            headers:
              type: object
              additionalProperties: { type: string }
            body:
              description: Raw event payload; json object.
              additionalProperties: true
        response:
          type: object
          description: Populated on detail responses only; body truncated to 4 KiB.
          properties:
            status:  { type: integer }
            headers:
              type: object
              additionalProperties: { type: string }
            body:      { type: string }
            durationMs: { type: integer, minimum: 0 }
    WebhookProbeRequest:
      type: object
      required: [siteId, url, signingSecret]
      properties:
        siteId: { type: string }
        url:
          type: string
          format: uri
        signingSecret:
          type: string
          description: Secret to hmac-sign the synthetic probe payload with.

    # utility
    WhoAmIResponse:
      type: object
      required: [scopes]
      properties:
        userId:
          type: string
          nullable: true
          description: Present when authenticated with a user session.
        keyId:
          type: string
          nullable: true
          description: Present when authenticated with an api key.
        keyPrefix:
          type: string
          nullable: true
        environment:
          type: string
          enum: [live, test]
          nullable: true
        scopes:
          type: array
          items: { $ref: '#/components/schemas/Scope' }
        rateLimit:
          type: object
          required: [limit, remaining, resetAt]
          properties:
            limit:     { type: integer }
            remaining: { type: integer }
            resetAt:
              type: string
              format: date-time
        quota:
          type: object
          properties:
            tier:
              type: string
              enum: [free, starter, pro, enterprise]
            usedBytes:
              type: integer
              format: int64
            limitBytes:
              type: integer
              format: int64
    VersionResponse:
      type: object
      required: [current, supported, deprecated, retired]
      properties:
        current:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        supported:
          type: array
          items:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        deprecated:
          type: array
          items:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
        retired:
          type: array
          items:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
