                  ok: { type: boolean }
                  data: { $ref: '#/components/schemas/RemoveMachineResult' }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/deployments:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    get:
      operationId: listMachineDeployments
      tags: [machines]
      summary: per-machine deployment history
      description: |
        Lists the current per-roost deployment state for roosts that target
        the machine. The MVP route is intentionally unpaginated.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Current per-roost deployment state.
          content:
            application/json:
              schema:
                type: object
                required: [siteId, machineId, deployments]
                properties:
                  siteId: { type: string }
                  machineId: { type: string }
                  deployments:
                    type: array
                    items: { $ref: '#/components/schemas/MachineDeployment' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  # ──────────────────────────────────────────────────────────────────────
  # 7b. installer-deploys (api-sprint wave 1 — track 1A)
  #     Public, scoped, api-key-friendly deployment endpoints.
  # ──────────────────────────────────────────────────────────────────────
  /api/sites/{siteId}/deployments:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    get:
      operationId: listSiteDeployments
      tags: [Deployments]
      summary: list installer deployments for a site
      description: |
        Cursor-paginated list of installer deployments on a site,
        newest first. Requires `site=<siteId>:read`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/PageSizeQuery'
        - $ref: '#/components/parameters/PageTokenQuery'
      responses:
        '200':
          description: Paginated deployments.
          content:
            application/json:
              schema:
                type: object
                required: [items, next_page_token]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/InstallerDeploymentSummary' }
                  next_page_token:
                    type: string
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    post:
      operationId: createSiteDeployment
      tags: [Deployments]
      summary: create an installer deployment
      description: |
        Creates a deployment record + fans out `install_software`
        commands to each target machine. Requires
        `site=<siteId>:write` and an `Idempotency-Key` header for
        replay-safe retries.

        Per-site target quota is read from `sites/{siteId}.deployQuota`
        (default 100). Requests over the quota return 413 with
        `code: over_quota`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, installer_url, installer_name, silent_flags, machines]
              properties:
                name: { type: string }
                installer_url:
                  type: string
                  format: uri
                  description: Must be an `https://` url.
                installer_name: { type: string }
                silent_flags:
                  type: string
                  example: '/SILENT /NORESTART'
                verify_path: { type: string, nullable: true }
                sha256_checksum:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
                  nullable: true
                parallel_install: { type: boolean }
                close_processes:
                  type: array
                  items: { type: string }
                  description: Process executable names agents should close before install.
                suppress_projects:
                  type: array
                  items: { type: string }
                  description: Project names or paths agents should suppress before install.
                machines:
                  type: array
                  items: { type: string }
                  minItems: 1
      responses:
        '201':
          description: Deployment queued.
          content:
            application/json:
              schema:
                type: object
                required: [deploymentId, siteId, status, targets]
                properties:
                  deploymentId: { type: string }
                  siteId: { type: string }
                  status: { type: string }
                  targets:
                    type: array
                    items: { type: object }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '413': { $ref: '#/components/responses/Problem413' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/deployments/{deploymentId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/DeploymentIdPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    get:
      operationId: getSiteDeployment
      tags: [Deployments]
      summary: fetch deployment detail
      description: |
        Returns the deployment doc with per-target status array.
        Requires `site=<siteId>:read`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Deployment detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstallerDeploymentDetail' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    delete:
      operationId: deleteSiteDeployment
      tags: [Deployments]
      summary: delete a terminal deployment record
      description: |
        Deletes the deployment history record only. It does not uninstall
        software from target machines. The deployment and every target must
        already be terminal. Requires `site=<siteId>:write` and an
        `Idempotency-Key` header.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Deployment record deleted.
          content:
            application/json:
              schema:
                type: object
                required: [deploymentId, siteId, deleted]
                properties:
                  deploymentId: { type: string }
                  siteId: { type: string }
                  deleted: { type: boolean }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/deployments/{deploymentId}/retry:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/DeploymentIdPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    post:
      operationId: retrySiteDeployment
      tags: [Deployments]
      summary: re-queue install for failed targets only
      description: |
        Targets in `failed` state are reset to `pending` and the
        `install_software` command is re-queued for each. Targets
        in any other state are untouched. Deployment-level status
        flips back to `in_progress`. Requires `site=<siteId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Retry queued.
          content:
            application/json:
              schema:
                type: object
                required: [deploymentId, siteId, status, retried, machine_ids]
                properties:
                  deploymentId: { type: string }
                  siteId: { type: string }
                  status: { type: string }
                  retried: { type: integer }
                  machine_ids:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/deployments/{deploymentId}/cancel:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/DeploymentIdPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    post:
      operationId: cancelSiteDeployment
      tags: [Deployments]
      summary: cancel pending targets + purge their queued commands
      description: |
        Marks every target in `pending` / `closing_processes` /
        `downloading` state as `cancelled`, and removes the
        `install_software` command from each affected machine's
        pending command queue. Targets that have started
        `installing` (or are already terminal) are left alone.
        Requires `site=<siteId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Cancellation processed.
          content:
            application/json:
              schema:
                type: object
                required: [deploymentId, siteId, status, cancelled, machine_ids]
                properties:
                  deploymentId: { type: string }
                  siteId: { type: string }
                  status: { type: string }
                  cancelled: { type: integer }
                  machine_ids:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/deployments/{deploymentId}/uninstall:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/DeploymentIdPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    post:
      operationId: uninstallSiteDeployment
      tags: [Deployments]
      summary: queue uninstall_software per target
      description: |
        Queues `uninstall_software` on every target machine and flips
        the deployment-level status to `uninstalling`. Per-target
        reconciliation is asynchronous — poll `GET ../{deploymentId}`
        for progress. Requires `site=<siteId>:admin` (privileged
        relative to retry/cancel).
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema: { type: object }
      responses:
        '200':
          description: Uninstall queued.
          content:
            application/json:
              schema:
                type: object
                required: [deploymentId, siteId, status, queued, machine_ids]
                properties:
                  deploymentId: { type: string }
                  siteId: { type: string }
                  status: { type: string }
                  queued: { type: integer }
                  machine_ids:
                    type: array
                    items: { type: string }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  # ──────────────────────────────────────────────────────────────────────
  # 8. quotas
  # ──────────────────────────────────────────────────────────────────────
  # ----------------------------------------------------------------------
  # Site preset management (security boundary migration wave 3.6)
  # ----------------------------------------------------------------------
  /api/sites/{siteId}/presets/schedule:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
    get:
      operationId: listSchedulePresets
      tags: [Presets]
      summary: list schedule preset override docs
      description: |
        Lists schedule presets stored in Firestore at
        `config/{siteId}/schedule_presets`. Built-in defaults are merged
        by dashboard clients, not by this API. Requires the
        `PRESET_MANAGE` capability; API keys need `site=<siteId>:read`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Schedule preset docs.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/SchedulePreset' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    post:
      operationId: createSchedulePreset
      tags: [Presets]
      summary: create a custom schedule preset
      description: |
        Creates a custom schedule preset under
        `config/{siteId}/schedule_presets/{presetId}`. The server
        generates `sched-{slug}-{epochMs}` and stamps `createdAt`.
        Requires `PRESET_MANAGE`; API keys need `site=<siteId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SchedulePresetInput' }
      responses:
        '201':
          description: Schedule preset created.
          content:
            application/json:
              schema:
                type: object
                required: [presetId, siteId]
                properties:
                  presetId: { type: string }
                  siteId: { type: string }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/presets/schedule/{presetId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/PresetIdPath'
    get:
      operationId: getSchedulePreset
      tags: [Presets]
      summary: fetch a schedule preset doc
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Schedule preset.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SchedulePreset' }
        '400': { $ref: '#/components/responses/Problem400' }
