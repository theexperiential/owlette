  # ──────────────────────────────────────────────────────────────────────
  # 9. audit log (tamper-evident hash chain)
  # ──────────────────────────────────────────────────────────────────────
  /api/sites/{siteId}/audit-log:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    get:
      operationId: listAuditRecords
      tags: [audit-log]
      summary: list audit records for a site
      description: |
        Paginated hash-chained audit log. Requires `site:X:read`
        scope. Record kinds match the audit sink taxonomy:
        `signed_url_issued`, `distribution_started`,
        `version_pointer_changed`, `api_key_used`, `gc_run`,
        `api_key_mutated`, `chunk_mutated`, `deployment_mutated`,
        `distribution_mutated`, `process_mutated`, `roost_mutated`,
        `machine_command_dispatched`, `user_mutated`, `site_mutated`,
        `site_member_mutated`, `installer_mutated`, `webhook_mutated`,
        and `chat_mutated`.
        Use `page_size` and `page_token`; legacy `limit` and `cursor`
        are accepted for existing callers. `actor` matches the full actor
        string, for example `apiKey:<keyId>` or `user:<uid>`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum records per page.
        - name: page_token
          in: query
          required: false
          schema: { type: string }
          description: Previous `next_page_token` value.
        - name: kind
          in: query
          required: false
          schema: { type: string }
          description: Filter by audit kind.
        - name: actor
          in: query
          required: false
          schema: { type: string }
          description: Exact actor string, e.g. `apiKey:<keyId>` or `user:<uid>`.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO 8601 or unix-ms lower bound on `recordedAt`.
      responses:
        '200':
          description: Paginated audit records.
          content:
            application/json:
              schema:
                type: object
                required: [siteId, records, next_page_token, nextPageToken]
                properties:
                  siteId: { type: string }
                  records:
                    type: array
                    items: { $ref: '#/components/schemas/AuditRecord' }
                  next_page_token:
                    type: string
                  nextPageToken:
                    type: string
                    deprecated: true
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/audit-log/{recordHash}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/RecordHashPath'
      - $ref: '#/components/parameters/RoostVersionHeader'
    get:
      operationId: getAuditRecord
      tags: [audit-log]
      summary: fetch single audit record + verify chain
      description: |
        Returns a single audit record and the hash-chain verification
        result for the record hash plus its immediate predecessor link.
        Non-genesis records report `ok: false` if the predecessor is
        missing or malformed.
      security:
        - apiKey: []
