                installer_url:
                  type: string
                  format: uri
                  description: Must be an `https://` url.
                installer_name: { type: string }
                silent_flags:
                  type: string
                  example: '/SILENT /NORESTART'
                verify_path: { type: string, nullable: true }
                sha256_checksum:
                  type: string
                  pattern: '^[a-f0-9]{64}$'
                  nullable: true
                parallel_install: { type: boolean }
                machines:
                  type: array
                  items: { type: string }
                  minItems: 1
      responses:
        '201':
          description: Deployment queued.
          content:
            application/json:
              schema:
                type: object
                required: [deploymentId, siteId, status, targets]
                properties:
                  deploymentId: { type: string }
