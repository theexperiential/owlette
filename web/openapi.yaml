        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }
    delete:
      operationId: deleteSiteMachine
      tags: [machines]
      summary: remove a machine from a site
      description: |
        Hard-deletes the machine document, its config document, and the
        fixed pending/completed command-map documents. Requires
        `MACHINE_REMOVE`; in the current role matrix this is superadmin-only.
        API-key callers also need `machine=<machineId>:write`.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      responses:
        '200':
          description: Machine removal completed.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
