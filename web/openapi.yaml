  # ──────────────────────────────────────────────────────────────────────
  # api-sprint wave 2 — track 2A (machine-api MVP).
  # appended at end-of-paths to avoid line-conflict with parallel work.
  # ──────────────────────────────────────────────────────────────────────

  /api/sites/{siteId}/machines/{machineId}/commands:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    post:
      operationId: dispatchMachineCommand
      tags: [machines]
      summary: queue a command on a machine
      description: |
        Canonical site-scoped command endpoint. Restricted to an
        operator-safe allowlist covering machine power, screenshots,
        live view, display topology, process commands, cortex MCP tool
        calls, and Owlette updates. Requires `machine=<machineId>:write`
        for api-key callers and an idempotency key for all callers;
        session/id-token callers fall through to site membership.

        Returns 409 `machine_offline` if `machines/{machineId}.online`
        is `false` — the command is NOT queued.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      parameters:
        - $ref: '#/components/parameters/RequiredIdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [reboot_machine, shutdown_machine, cancel_reboot, dismiss_reboot_pending, capture_screenshot, start_live_view, stop_live_view, restart_process, start_process, kill_process, set_launch_mode, apply_display_topology, ack_display_topology, enumerate_display_modes, test_display_apply, mcp_tool_call, update_owlette]
                params:
                  type: object
                  description: |
                    Per-type parameters. `reboot_machine` /
                    `shutdown_machine` accept `delay_seconds` (>=0).
                    `capture_screenshot` accepts `monitor` ('all' |
                    'primary' | non-negative integer). Process commands
                    accept `process_name` / `process_id`; `set_launch_mode`
                    accepts `process_name`, `mode`, optional `schedules`, and
                    optional `schedulePresetId`; `apply_display_topology`
                    requires `layout` and `applyId`; `ack_display_topology`
                    requires `applyId`; `enumerate_display_modes` and
                    `test_display_apply` do not require params; `mcp_tool_call`
                    accepts `tool_name`, optional `tool_params`, and optional
                    `chat_id`. Other command types accept their
                    command-specific allowlisted fields.
                  properties:
                    delay_seconds: { type: integer, minimum: 0 }
                    monitor:
                      oneOf:
                        - type: string
                          enum: [all, primary]
                        - type: integer
                          minimum: 0
                    process_name: { type: string }
                    process_id: { type: string }
                    mode: { type: string }
                    schedules:
                      type: array
                      items: { type: object }
                    schedulePresetId: { type: string }
                    layout:
                      type: object
                      additionalProperties: true
                      description: Desired display topology for `apply_display_topology`.
                    applyId: { type: string }
                    tool_name: { type: string }
                    tool_params:
                      type: object
                      additionalProperties: true
                    chat_id: { type: string }
                timeout_seconds:
                  type: integer
                  minimum: 1
                  maximum: 600
                  default: 60
      responses:
        '202':
          description: Command queued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status:
                        type: string
                        enum: [pending]
        '400':
          description: |
            Validation failure. Stable code `unsupported_command_type`
            indicates the requested type is outside the public allowlist.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409':
          description: |
            `machine_offline` — machine is not currently connected; queueing is refused.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '422': { $ref: '#/components/responses/Problem422' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/commands/{commandId}:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
      - name: commandId
        in: path
        required: true
        schema:
          type: string
          pattern: '^cmd_[A-Za-z0-9_-]{1,80}$'
        description: Command id returned by the dispatch endpoint.
    get:
      operationId: getMachineCommandStatus
      tags: [machines]
      summary: poll command status
      description: |
        Returns the current status of a queued command. For completed
        `capture_screenshot` commands, the response includes a freshly-
        minted 1-hour signed read URL under `result.screenshot_url` —
        the URL is per-request and is never persisted.
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      responses:
        '200':
          description: Command status envelope.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [commandId, status]
                    properties:
                      commandId: { type: string }
                      status:
                        type: string
                        enum: [pending, in_progress, completed, failed]
                      result:
                        type: object
                        description: |
                          Present when status=completed. For
                          capture_screenshot commands, includes
                          `screenshot_url` (1-hour signed) +
                          `expires_at`.
                        properties:
                          screenshot_url: { type: string, format: uri }
                          expires_at: { type: string, format: date-time }
                      error:
                        type: string
                        description: Present when status=failed.
                      createdAt: { type: string, format: date-time, nullable: true }
                      updatedAt: { type: string, format: date-time, nullable: true }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/sites/{siteId}/machines/{machineId}/screenshots/upload-url:
    parameters:
      - $ref: '#/components/parameters/SiteIdPath'
      - $ref: '#/components/parameters/MachineIdSitePath'
    post:
      operationId: issueScreenshotUploadUrl
      tags: [machines]
      summary: mint a 5-minute signed write url for screenshot upload
      description: |
        Agent-internal helper invoked during a `capture_screenshot`
        command. Returns a 5-minute v4-signed PUT URL plus the
        canonical storage path (`screenshots/{siteId}/{machineId}/...png`)
        the agent should write to. Decoupling upload from command
        queueing keeps multi-megabyte image payloads off the web tier.

        30-day retention is enforced via a separate Firebase Storage
        lifecycle rule (out of scope for this endpoint).
      security:
        - apiKey: []
        - bearerApiKey: []
        - firebaseIdToken: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                contentType:
                  type: string
                  enum: [image/png, image/jpeg]
                  default: image/png
      responses:
        '200':
          description: Signed upload url issued.
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean }
                  data:
                    type: object
                    required: [uploadUrl, storagePath, contentType, expiresAt]
                    properties:
                      uploadUrl: { type: string, format: uri }
                      storagePath: { type: string }
                      contentType: { type: string }
                      expiresAt: { type: string, format: date-time }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403': { $ref: '#/components/responses/Problem403' }
        '404': { $ref: '#/components/responses/Problem404' }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  # Public API Wave 1.1 coverage additions.

  /api/cli/device-code:
    post:
      operationId: createCliDeviceCode
      tags: [api-keys]
      summary: start CLI device-code login
      description: |
        Starts a short-lived CLI pairing flow. The CLI displays the
        pairing phrase and polls `/api/cli/device-code/poll` with the
        opaque device code until a signed-in user authorizes it.
      security: []
      responses:
        '200':
          description: Device-code login started.
          content:
            application/json:
              schema:
                type: object
                required:
                  - pairPhrase
                  - deviceCode
                  - verificationUri
                  - pairingUrl
                  - expiresIn
                  - interval
                properties:
                  pairPhrase: { type: string }
                  deviceCode: { type: string }
                  verificationUri: { type: string, format: uri }
                  pairingUrl: { type: string, format: uri }
                  expiresIn: { type: integer, example: 600 }
                  interval: { type: integer, example: 5 }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/cli/device-code/authorize:
    post:
      operationId: authorizeCliDeviceCode
      tags: [api-keys]
      summary: authorize CLI device-code login
      description: |
        Browser-side approval step for CLI pairing. Requires a signed-in
        user or Firebase ID token, validates site access for requested
        scopes, then mints an `owk_*` API key for the waiting CLI.
      security:
        - firebaseIdToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, scopes]
              properties:
                code: { type: string }
                name: { type: string, minLength: 1, maxLength: 100 }
                ttlDays: { type: integer, minimum: 1, maximum: 365, default: 90 }
                environment:
                  type: string
                  enum: [live, test]
                  default: live
                scopes:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [resource, id, permissions]
                    properties:
                      resource: { type: string }
                      id: { type: string }
                      permissions:
                        type: array
                        minItems: 1
                        items: { type: string }
      responses:
        '200': { description: Device code authorized and key minted. }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
        '403':
          description: Forbidden - superadmin required for `user` or `installer` scopes.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/ProblemDetails' }
        '404': { $ref: '#/components/responses/Problem404' }
        '409': { $ref: '#/components/responses/Problem409' }
        '410': { description: Pairing phrase expired. }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

  /api/cli/device-code/poll:
    post:
      operationId: pollCliDeviceCode
      tags: [api-keys]
      summary: poll CLI device-code login
      description: |
        CLI polling endpoint for the device-code flow. The device code is
        the polling credential; once authorized, the raw API key is returned
        exactly once and the pairing record is deleted.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceCode]
              properties:
                deviceCode: { type: string }
      responses:
        '200':
          description: Authorized API key returned once.
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey: { type: string }
                  keyId: { type: string, nullable: true }
                  name: { type: string, nullable: true }
                  scopes:
                    type: array
                    nullable: true
                    items: { type: object }
                  environment: { type: string, nullable: true }
                  expiresAt:
                    oneOf:
                      - { type: integer }
                      - { type: 'null' }
                  siteId: { type: string, nullable: true }
        '202': { description: Authorization still pending. }
        '400': { $ref: '#/components/responses/Problem400' }
        '404': { $ref: '#/components/responses/Problem404' }
        '410': { description: Device code expired. }
        '429': { $ref: '#/components/responses/Problem429' }
        '500': { $ref: '#/components/responses/Problem500' }

