      responses:
        '200':
          description: Audit record + chain proof.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditRecordDetail' }
        '400': { $ref: '#/components/responses/Problem400' }
        '401': { $ref: '#/components/responses/Problem401' }
