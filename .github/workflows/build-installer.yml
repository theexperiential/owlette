name: build installer (slsa l3)

# Hermetic CI build of the roost agent installer with SLSA Build Level 3
# provenance (roost wave 5.8). Trigger on a release tag (`vX.Y.Z`) or
# manual dispatch for test runs. The produced installer + in-toto
# attestation are uploaded to the GitHub release so the slsa-verifier
# can prove the installer was built from this repo at this commit by
# this trusted workflow, not by a human on a laptop.
#
# Level 3 requires:
#   - build runs on a trusted CI system (✅ github-hosted runner)
#   - provenance is generated by the CI system itself, NOT the source
#     uploader (✅ slsa-github-generator reusable workflow, keyless-signed
#     via sigstore over github OIDC)
#   - provenance is non-falsifiable by the build (✅ the generator runs
#     in a separate job, reads the hash we output, signs outside our control)
#
# The authenticode signing step (wave 5.9) is separate — that needs the
# EV cert from wave 0.7 and wraps THIS artifact after provenance is sealed.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'installer version (defaults to agent/VERSION on dispatch runs)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------
  # 1. Hermetic Windows build
  # ----------------------------------------------------------------------
  build:
    name: build installer on windows-latest
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      artifact-name: ${{ steps.build.outputs.artifact-name }}
      artifact-sha256: ${{ steps.digest.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so the VERSION + changelog commit that triggered
          # the tag are in the source tree for the build to reference.
          fetch-depth: 0

      - name: resolve version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ("${{ github.event_name }}" -eq "push" -and $ref -like "refs/tags/v*") {
            # trim leading refs/tags/v
            $v = $ref.Substring("refs/tags/v".Length)
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = (Get-Content "agent/VERSION" -ErrorAction Stop).Trim()
          }
          if ($v -notmatch '^\d+\.\d+\.\d+$') {
            throw "refusing to build: version '$v' must be X.Y.Z semver"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "building installer version $v"

      - name: install Inno Setup 6
        shell: pwsh
        run: choco install innosetup --version=6.2.2 -y --no-progress

      - name: pin Python toolchain version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: build installer
        id: build
        shell: cmd
        working-directory: agent
        env:
          OWLETTE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          :: The batch file reads agent/VERSION; write our resolved version in
          :: case the checkout didn't match the tag (belt-and-suspenders).
          echo %OWLETTE_VERSION%> VERSION
          call build_installer_full.bat
          if errorlevel 1 exit /b 1
          :: output artifact name for downstream jobs
          echo artifact-name=Owlette-Installer-v%OWLETTE_VERSION%.exe>> %GITHUB_OUTPUT%

      - name: compute artifact SHA-256 (base64) for SLSA subject
        id: digest
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $path = "agent/build/installer_output/Owlette-Installer-v$version.exe"
          if (!(Test-Path $path)) {
            throw "installer not found at $path — build step did not produce expected artifact"
          }
          # Output BOTH lowercase hex (what slsa-verifier CLI wants) and
          # base64 (what the generator input expects). Hex in summary;
          # base64 into GITHUB_OUTPUT.
          $bytes = [IO.File]::ReadAllBytes($path)
          $sha = [System.Security.Cryptography.SHA256]::Create().ComputeHash($bytes)
          $hex = ([BitConverter]::ToString($sha) -replace '-', '').ToLower()
          $b64 = [Convert]::ToBase64String($sha)
          Write-Host "sha256 (hex):    $hex"
          Write-Host "sha256 (base64): $b64"
          "sha256=$hex" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256-b64=$b64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: owlette-installer
          path: agent/build/installer_output/Owlette-Installer-v${{ steps.version.outputs.version }}.exe
          retention-days: 7

  # ----------------------------------------------------------------------
  # 2. SLSA Build L3 provenance
  # ----------------------------------------------------------------------
  # The generic slsa-github-generator runs in its own job (not on the
  # build runner) so the build can't forge its own attestation. It signs
  # with sigstore keylessly via github's OIDC token — the resulting
  # provenance is verifiable by anyone with `slsa-verifier`.
  provenance:
    name: slsa provenance
    needs: [build]
    permissions:
      id-token: write       # keyless signing via OIDC
      contents: write       # attach attestation to release
      actions: read         # reusable workflow metadata
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: "${{ needs.build.outputs.artifact-sha256 }} ${{ needs.build.outputs.artifact-name }}"
      # upload the signed .intoto.jsonl provenance next to the artifact
      # on the release page. requires `contents: write` above.
      upload-assets: ${{ startsWith(github.ref, 'refs/tags/v') }}
      provenance-name: owlette-installer.intoto.jsonl

  # ----------------------------------------------------------------------
  # 3. Publish installer to the release (only on tag pushes)
  # ----------------------------------------------------------------------
  release:
    name: attach installer to release
    needs: [build, provenance]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owlette-installer
          path: .

      - name: upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Owlette-Installer-v${{ needs.build.outputs.version }}.exe

  # ----------------------------------------------------------------------
  # 4. Smoke-verify the provenance (catches a misconfigured generator
  #    before the artifact ships to end users)
  # ----------------------------------------------------------------------
  verify:
    name: slsa-verifier smoke
    needs: [build, provenance, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: install slsa-verifier
        run: |
          VERIFIER_VERSION=v2.6.0
          curl -sSL \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/${VERIFIER_VERSION}/slsa-verifier-linux-amd64" \
            -o /usr/local/bin/slsa-verifier
          chmod +x /usr/local/bin/slsa-verifier

      - name: download installer
        uses: actions/download-artifact@v4
        with:
          name: owlette-installer
          path: .

      - name: download provenance attestation from release
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            --pattern 'owlette-installer.intoto.jsonl' \
            --dir .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: verify provenance
        run: |
          slsa-verifier verify-artifact \
            "Owlette-Installer-v${{ needs.build.outputs.version }}.exe" \
            --provenance-path owlette-installer.intoto.jsonl \
            --source-uri "github.com/${GITHUB_REPOSITORY}" \
            --source-tag "${GITHUB_REF_NAME}"
