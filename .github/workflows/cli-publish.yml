name: cli publish

# Publish @owlette/cli to npm from a release tag (`cli-vX.Y.Z`) or via
# manual dispatch. Manual dispatch defaults to dry-run so the first
# operator-triggered execution can validate package contents without
# publishing. Tag pushes always publish after the package version is
# verified against the tag.

on:
  push:
    tags:
      - 'cli-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'optional tag or ref to publish from'
        required: false
        type: string
      dry_run:
        description: 'run npm publish with --dry-run'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: cli-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Build
        working-directory: cli
        run: npm run build

      - name: Test
        working-directory: cli
        run: npm test

      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail

          tag=""
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
            tag="${tag#refs/tags/}"
          fi

          if [ -z "$tag" ]; then
            echo "no tag supplied on workflow_dispatch; skipping tag/version check"
            exit 0
          fi

          if [[ ! "$tag" =~ ^cli-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "refusing to publish: tag '$tag' must match cli-vX.Y.Z"
            exit 1
          fi

          expected="${tag#cli-v}"
          actual="$(node -p "require('./cli/package.json').version")"
          if [ "$actual" != "$expected" ]; then
            echo "refusing to publish: cli/package.json version '$actual' does not match tag '$tag' (expected '$expected')"
            exit 1
          fi

          echo "package version $actual matches $tag"

      - name: Publish
        working-directory: cli
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          dry_run_flag=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            dry_run_flag="--dry-run"
          fi

          npm publish --access public --provenance $dry_run_flag
